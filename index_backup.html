  function groupFor(d,ph){

    _fbDb=getDatabase(app);
    _onVal=cb=>onValue(ref(_fbDb,DB_PATH),s=>cb(s.val()));
    _setFn=d=>set(ref(_fbDb,DB_PATH),d);
    return _fbDb;
  }
