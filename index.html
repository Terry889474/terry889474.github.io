function groupFor(d,ph){
  if(ph===2)return['Steve','Derek','Terry'];
  const dt=new Date(d+'T12:00:00');
  if(dt<=new Date('2026-05-20T12:00:00'))return['Steve','Derek','Terry'];
  if(dt<=new Date('2026-06-03T12:00:00'))return['Steve','Derek','Terry','Mark','Ant','Charles'];
  return['Steve','Derek','Terry','Mark','Ant'];
}
function mkNight(n,ph){
  return{...n,phase:ph,group:ph===2?['Steve','Derek','Terry']:groupFor(n.date,ph),actualTotal:null,payments:Object.fromEntries(RIDERS.map(r=>[r,{amount:0,method:null}]))};
}

const ecost=n=>n.actualTotal!==null?n.actualTotal:(n.bookingCost||0);

function fuelObj2Arr(f){
  if(!f)return[];
  if(Array.isArray(f))return f;
  return Object.values(f);
}
// ── Deposit drawdown ──────────────────────────────────────────────
function calcDrawdown(rider,nights,deposit){
  const myNights=nights.filter(n=>n.group.includes(rider)).slice().sort((a,b)=>a.date.localeCompare(b.date));
  let pool=deposit;
  const perNight={};
  myNights.forEach(n=>{
    const cost=n.actualTotal!==null?n.actualTotal:(n.bookingCost||0);
    const share=n.group.length>0?cost/n.group.length:0;
    const eft=n.payments[rider]?.method==='eft'?(n.payments[rider]?.amount||0):0;
    const needed=Math.max(0,share-eft);
    const used=Math.min(pool,needed);
    pool=Math.max(0,pool-used);
    perNight[n.id]={depositUsed:used,eftAmount:eft,share,totalCovered:eft+used,covered:(eft+used)>=share-0.01};
  });
  return{perNight,depositRemaining:pool};
}
function fuelNetPosition(rider,fuelArr){
  let net=0;
  (fuelArr||[]).forEach(e=>{
    if(!e.ridersPresent||!e.ridersPresent.includes(rider))return;
    const share=(e.totalCost||0)/(e.ridersPresent.length||1);
    if(e.pumpPerson===rider)net+=(e.totalCost||0)-share;
    else net-=share;
  });
  return net;
}
function fuelPumpCount(rider,fuelArr){return(fuelArr||[]).filter(e=>e.pumpPerson===rider).length;}

// Firebase loaded via script tags — no dynamic imports needed
let _fbApp=null,_fbDb=null,_onVal=null,_setFn=null;
function initFB(){
  if(_fbDb)return true;
  try{
    _fbApp=firebase.apps.length?firebase.apps[0]:firebase.initializeApp(FIREBASE_CONFIG);
    _fbDb=firebase.database(_fbApp);
    _onVal=cb=>{_fbDb.ref(DB_PATH).on('value',s=>cb(s.val()));};
    _setFn=d=>_fbDb.ref(DB_PATH).set(d);
    return true;
  }catch(e){console.error('Firebase init failed',e);return false;}
}

function App(){
  const [identity,setIdentity]=useState(null);
  const [data,setData]=useState(null);
  const [syncing,setSyncing]=useState(false);
  const [syncOk,setSyncOk]=useState(false);
  const [fbLoaded,setFbLoaded]=useState(false);
  const [tab,setTab]=useState('deadlines');
  const [phase,setPhase]=useState(1);
  const [expanded,setExpanded]=useState(null);
  const unsubRef=useRef(null);

  useEffect(()=>{
    const s=localStorage.getItem('et2026-id');
    if(s&&RIDERS.includes(s))setIdentity(s);
  },[]);

  useEffect(()=>{
    if(!identity)return;
    if(!FIREBASE_ON){
      try{const l=localStorage.getItem('et2026-local');setData(l?JSON.parse(l):DEF);}catch{setData(DEF);}
      return;
    }
    setSyncing(true);
    const ok=initFB();
    if(!ok){
      try{const l=localStorage.getItem('et2026-local');setData(l?JSON.parse(l):DEF);}catch{setData(DEF);}
      setSyncing(false);
      return;
    }
    setFbLoaded(true);
    _onVal(val=>{
      if(!val){_setFn(DEF);setData(DEF);}
      else{
        const merged={...DEF,...val,
          nights:DEF.nights.map(def=>{
                const live=(val.nights||[]).find(n=>n.id===def.id);
                if(!live)return def;
                const payments=Object.fromEntries(RIDERS.map(r=>{const p=live.payments?.[r];if(p==null||p===0)return[r,{amount:0,method:null}];if(typeof p==='number')return[r,{amount:p,method:null}];return[r,p];}));
                return{...def,...live,payments};
              }),
              deposits:{...DEF.deposits,...(val.deposits||{})},
              resolvedDeadlines:{...(val.resolvedDeadlines||{})},
              fuel:(val.fuel&&typeof val.fuel==='object'&&!Array.isArray(val.fuel))?val.fuel:{},
        };
        setData(merged);
      }
      setSyncing(false);setSyncOk(true);setTimeout(()=>setSyncOk(false),2000);
    });
    return()=>{if(FIREBASE_ON&&_fbDb)_fbDb.ref(DB_PATH).off();};
    return()=>{if(unsubRef.current)unsubRef.current();};
  },[identity]);

  const persist=useCallback(nd=>{
    if(FIREBASE_ON&&fbLoaded)_setFn(nd).catch(()=>{});
    else try{localStorage.setItem('et2026-local',JSON.stringify(nd));}catch{}
  },[fbLoaded]);

  const updateNight=useCallback((id,upd)=>setData(prev=>{
    if(!prev)return prev;
    const nd={...prev,nights:prev.nights.map(n=>n.id===id?{...n,...upd}:n)};
    persist(nd);return nd;
  }),[persist]);
  const updateDeposit=useCallback((rider,val)=>setData(prev=>{
    if(!prev)return prev;
    const nd={...prev,deposits:{...prev.deposits,[rider]:parseFloat(val)||0}};
    persist(nd);return nd;
  }),[persist]);
  const toggleResolved=useCallback(id=>setData(prev=>{
    if(!prev)return prev;
    const cur=prev.resolvedDeadlines||{};
    const nd={...prev,resolvedDeadlines:cur[id]?Object.fromEntries(Object.entries(cur).filter(([k])=>k!==id)):{...cur,[id]:true}};
    persist(nd);return nd;
  }),[persist]);
  const addNight=useCallback(nd=>setData(prev=>{
    if(!prev)return prev;
    const n={id:'r'+Date.now(),phase:2,group:['Steve','Derek','Terry'],actualTotal:null,payments:Object.fromEntries(RIDERS.map(r=>[r,{amount:0,method:null}])),preCharge:0,bookingCost:0,ref:'',...nd};
    const next={...prev,nights:[...prev.nights,n]};persist(next);return next;
  }),[persist]);
  const deleteNight=useCallback(id=>setData(prev=>{
    if(!prev)return prev;
    const nd={...prev,nights:prev.nights.filter(n=>n.id!==id)};persist(nd);return nd;
  }),[persist]);

  // FIX 4: store fuel entry as object keyed by ID
  const addFuelEntry=useCallback(entry=>setData(prev=>{
    if(!prev)return prev;
    const id='f'+Date.now();
    const nd={...prev,fuel:{...(prev.fuel||{}),[id]:{id,...entry}}};
    persist(nd);return nd;
  }),[persist]);

  // FIX 5: delete from object not array
  const deleteFuelEntry=useCallback(id=>setData(prev=>{
    if(!prev)return prev;
    const f={...(prev.fuel||{})};
    delete f[id];
    const nd={...prev,fuel:f};
    persist(nd);return nd;
  }),[persist]);

  if(!identity)return <IdentityScreen onSelect={r=>{localStorage.setItem('et2026-id',r);setIdentity(r);}}/>;
  if(!data)return(
    <div style={{height:'100vh',display:'flex',alignItems:'center',justifyContent:'center',flexDirection:'column',gap:12,background:'#0F172A'}}>
      <div style={{fontSize:36}}>🏍️</div>
      <div style={{color:'#94A3B8',fontSize:12,letterSpacing:'.1em'}}>CONNECTING…</div>
    </div>
  );

  const role=ROLE(identity);
  const nights=data.nights;
  // FIX 6: convert fuel object to array once here — all components receive a plain array
  const fuel=fuelObj2Arr(data.fuel);
  const resolved=data.resolvedDeadlines||{};
  const activeDls=DEADLINES.filter(d=>!resolved[d.id]);
  const urgentCt=activeDls.filter(d=>{const x=daysUntil(d.deadline);return x>=0&&x<=14;}).length;
  const overdueCt=activeDls.filter(d=>daysUntil(d.deadline)<0).length;
  const alertCt=urgentCt+overdueCt;
  const phaseNights=nights.filter(n=>n.phase===phase);
  const pSum=rider=>{
    const dep=data.deposits[rider]||0;
    const {perNight,depositRemaining}=calcDrawdown(rider,nights,dep);
    const my=nights.filter(n=>n.group.includes(rider));
    const actualShare=my.reduce((s,n)=>s+rshare(n,rider),0);
    const totalCovered=Object.values(perNight).reduce((s,v)=>s+v.totalCovered,0);
    const eftTotal=Object.values(perNight).reduce((s,v)=>s+v.eftAmount,0);
    const depositUsed=dep-depositRemaining;
    return{actualShare,totalCovered,eftTotal,depositUsed,depositRemaining,deposit:dep,balance:actualShare-totalCovered,count:my.length,budgetShare:my.reduce((s,n)=>s+(n.bookingCost>0?n.bookingCost/n.group.length:0),0)};
  };
  const{border,dark}=RC[identity];

  return(
    <div style={{maxWidth:480,margin:'0 auto',background:'#0F172A',minHeight:'100vh',fontFamily:'system-ui,-apple-system,sans-serif',color:'#F8FAFC',paddingBottom:84}}>
      <div style={{padding:'0 16px 8px',paddingTop:'max(12px,env(safe-area-inset-top,12px))',borderBottom:'1px solid #1E293B',background:'#0F172A',position:'sticky',top:0,zIndex:30}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <div>
            <div style={{fontSize:17,fontWeight:700,letterSpacing:'-0.02em'}}>EuroTrash 2026 🏍</div>
            <div style={{display:'flex',alignItems:'center',gap:6,marginTop:2}}>
              <span style={{fontSize:11,padding:'3px 10px',borderRadius:20,background:RC[identity].solid,color:'#FFFFFF',border:'none',fontWeight:700,cursor:'pointer',boxShadow:'0 0 0 2px #FFFFFF'}}
                onClick={()=>{if(window.confirm('Switch rider?')){localStorage.removeItem('et2026-id');setIdentity(null);}}}>
                {identity}{role==='admin'?' ⚙':''}
              </span>
              {FIREBASE_ON
                ?<span style={{fontSize:10,color:syncing?'#F59E0B':syncOk?'#10B981':'#334155'}}>{syncing?'⟳ syncing':syncOk?'✓ synced':'● live'}</span>
                :<span style={{fontSize:10,color:'#475569'}}>● local</span>}
            </div>
          </div>
          {tab==='nights'&&role==='admin'&&(
            <div style={{display:'flex',gap:5}}>
              {[{v:1,l:'Main'},{v:2,l:'Return'}].map(p=>(
                <button key={p.v} onClick={()=>{setPhase(p.v);setExpanded(null);}} style={{padding:'5px 10px',borderRadius:20,border:'none',cursor:'pointer',fontSize:12,fontWeight:500,background:phase===p.v?'#3B82F6':'#1E293B',color:phase===p.v?'white':'#94A3B8'}}>{p.l}</button>
              ))}
            </div>
          )}
        </div>
      </div>

      {tab==='deadlines'&&<DeadlinesTab deadlines={activeDls} resolved={resolved} toggleResolved={toggleResolved} allDeadlines={DEADLINES} role={role}/>}
      {tab==='nights'&&<NightsTab nights={phaseNights} allNights={nights} deposits={data.deposits} expanded={expanded} setExpanded={setExpanded} updateNight={updateNight} deleteNight={deleteNight} phase={phase} identity={identity} role={role}/>}
      {tab==='people'&&<PeopleTab riders={RIDERS} pSum={pSum} deposits={data.deposits} updateDeposit={updateDeposit} identity={identity} role={role} nights={nights} fuel={fuel}/>}
      {tab==='fuel'&&<FuelTab fuel={fuel} role={role} identity={identity} addFuelEntry={addFuelEntry} deleteFuelEntry={deleteFuelEntry}/>}
      {tab==='add'&&role==='admin'&&<AddTab addNight={addNight} setTab={setTab}/>}
      {tab==='add'&&role==='rider'&&<MyBalanceTab identity={identity} summary={pSum(identity)} fuelNet={fuelNetPosition(identity,fuel)}/>}

      <div style={{position:'fixed',bottom:0,left:'50%',transform:'translateX(-50%)',width:'100%',maxWidth:480,background:'#0F172A',borderTop:'1px solid #1E293B',display:'flex',zIndex:30,paddingBottom:'env(safe-area-inset-bottom)'}}>
        {[
          {id:'deadlines',icon:'⏱',label:'Deadlines',badge:alertCt},
          {id:'nights',icon:'◉',label:'Nights'},
          {id:'people',icon:'◎',label:'People'},
          {id:'fuel',icon:'⛽',label:'Fuel'},
          {id:'add',icon:role==='admin'?'⊕':'◈',label:role==='admin'?'Add':'Balance'},
        ].map(t=>(
          <button key={t.id} onClick={()=>setTab(t.id)} style={{flex:1,padding:'9px 0 7px',border:'none',background:'none',cursor:'pointer',color:tab===t.id?'#3B82F6':'#475569',display:'flex',flexDirection:'column',alignItems:'center',gap:2,position:'relative'}}>
            {t.badge>0&&<span style={{position:'absolute',top:5,right:'50%',marginRight:-16,background:'#EF4444',color:'white',fontSize:9,fontWeight:700,padding:'1px 4px',borderRadius:10,lineHeight:1.4}}>{t.badge}</span>}
            <span style={{fontSize:17,lineHeight:1}}>{t.icon}</span>
            <span style={{fontSize:9,fontWeight:tab===t.id?600:400,letterSpacing:'.04em'}}>{t.label.toUpperCase()}</span>
          </button>
        ))}
      </div>
    </div>
  );
}

    </div>
  );

function NightCard({night,isExpanded,onToggle,updateNight,deleteNight,phase,identity,role,nights,deposits}){
  const [eAct,setEAct]=useState('');const [ePre,setEPre]=useState('');const [eProp,setEProp]=useState('');const [eLoc,setELoc]=useState('');const [eCost,setECost]=useState('');const [eNotes,setENotes]=useState('');const [editM,setEditM]=useState(false);const [showDel,setShowDel]=useState(false);const prev=useRef(false);

  const st=nSt(night);const sc=NS[st];const cost=ecost(night);const ppp=ppn(night);const isAdm=role==='admin';
  const saveAct=()=>{const v=parseFloat(eAct);updateNight(night.id,{actualTotal:isNaN(v)?null:v});};
  const savePre=()=>{const v=parseFloat(ePre);updateNight(night.id,{preCharge:isNaN(v)?0:v});};
  const saveEd=()=>{updateNight(night.id,{property:eProp,location:eLoc,bookingCost:parseFloat(eCost)||0,notes:eNotes});setEditM(false);};
  const updPay=(rider,val)=>updateNight(night.id,{payments:{...night.payments,[rider]:{amount:parseFloat(val)||0,method:'eft'}}});
  const editRiders=isAdm?night.group:night.group.filter(r=>r===identity);
  return(
    <div style={{margin:'4px 12px',borderRadius:12,background:'#141C27',border:`1px solid ${isExpanded?'#3B82F633':'#1E293B'}`,overflow:'hidden'}}>
      <div onClick={onToggle} style={{padding:'11px 14px',cursor:'pointer',display:'flex',alignItems:'center',gap:10}}>
        <div style={{width:8,height:8,borderRadius:'50%',flexShrink:0,background:sc.dot}}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',gap:8}}>
            <div style={{fontSize:13,fontWeight:600,color:st==='urgent'?'#FCA5A5':st==='settled'?'#6EE7B7':'#F1F5F9',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{night.property}</div>
            <div style={{fontSize:12,fontWeight:600,color:'#94A3B8',flexShrink:0}}>{night.actualTotal!==null?<span style={{color:'#34D399'}}>{ef(cost)}</span>:ef(night.bookingCost)}</div>
          </div>
          <div style={{display:'flex',gap:8,marginTop:3,alignItems:'center'}}>
            <span style={{fontSize:11,color:'#64748B'}}>{fmtD(night.date)}</span>
            <span style={{fontSize:11,color:'#475569'}}>·</span>
            <span style={{fontSize:11,color:'#64748B',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{night.location}</span>
            {!isAdm&&<span style={{marginLeft:'auto',fontSize:10,padding:'2px 6px',borderRadius:10,background:'#0F172A',color:sc.dot,fontWeight:500,flexShrink:0}}>You: {ef(rshare(night,identity))}</span>}
          </div>
        </div>

            <button onClick={()=>setEditM(!editM)} style={{fontSize:11,padding:'4px 8px',borderRadius:6,border:'1px solid #3B82F633',background:editM?'#3B82F622':'none',color:'#60A5FA',cursor:'pointer'}}>{editM?'Cancel':'Edit'}</button>
          </div>)}

            <div style={{background:'#1E293B',borderRadius:10,padding:12,marginBottom:12}}>
              {[{l:'Property',v:eProp,s:setEProp},{l:'Location',v:eLoc,s:setELoc}].map(f=>(<div key={f.l} style={{marginBottom:8}}><div style={{fontSize:11,color:'#64748B',marginBottom:3}}>{f.l}</div><input value={f.v} onChange={ev=>f.s(ev.target.value)} style={{width:'100%',background:'#0F172A',border:'1px solid #334155',borderRadius:6,padding:'8px 10px',color:'#F1F5F9',fontSize:13}}/></div>))}
              <div style={{marginBottom:8}}><div style={{fontSize:11,color:'#64748B',marginBottom:3}}>Booking cost €</div><input type="number" value={eCost} onChange={ev=>setECost(ev.target.value)} style={{width:'100%',background:'#0F172A',border:'1px solid #334155',borderRadius:6,padding:'8px 10px',color:'#F1F5F9',fontSize:13}}/></div>

              <button onClick={saveEd} style={{width:'100%',padding:9,borderRadius:8,border:'none',background:'#3B82F6',color:'white',fontWeight:600,fontSize:13,cursor:'pointer'}}>Save Changes</button>
            </div>
          )}
          {night.notes&&!editM&&<div style={{fontSize:11,color:'#64748B',marginBottom:12,fontStyle:'italic'}}>{night.notes}</div>}
          {isAdm&&(<>
            <div style={{display:'flex',gap:8,marginBottom:12}}>
              <div style={{flex:1}}><div style={{fontSize:11,color:'#64748B',marginBottom:4}}>Pre-charged to card</div><div style={{display:'flex',gap:6,alignItems:'center'}}><span style={{color:'#94A3B8'}}>€</span><input type="number" step="0.01" value={ePre} onChange={e=>setEPre(e.target.value)} onBlur={savePre} style={{flex:1,background:'#1E293B',border:'1px solid #22C55E44',borderRadius:8,padding:'7px 10px',color:'#86EFAC',fontSize:14,fontWeight:500}}/></div></div>

          </>)}

            const rd=perNight[night.id]||{depositUsed:0,eftAmount:0,share:rshare(night,rider),totalCovered:0,covered:false};
            const{depositUsed,eftAmount,share,covered}=rd;

                </div>
                <div style={{fontSize:12,color:'#64748B'}}>Share: <span style={{color:'#F1F5F9',fontWeight:600}}>{ef(share)}</span></div>
              </div>
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:5,marginBottom:8}}>
                {[{l:'Deposit',v:depositUsed>0?ef(depositUsed):'—',c:depositUsed>0?'#FCD34D':'#334155',bg:'#1C1500'},{l:'EFT',v:eftAmount>0?ef(eftAmount):'—',c:eftAmount>0?'#60A5FA':'#334155',bg:'#0D1B2A'},{l:'Balance',v:covered?'Paid':ef(bal),c:covered?'#10B981':bal>0?'#F87171':'#10B981',bg:'#0A1F14'}].map(({l,v,c,bg})=>(
                  <div key={l} style={{background:bg,borderRadius:6,padding:'5px 7px',textAlign:'center'}}>
                    <div style={{fontSize:9,color:'#64748B',marginBottom:1}}>{l}</div>
                    <div style={{fontSize:12,fontWeight:600,color:c}}>{v}</div>
                  </div>
                ))}
              </div>
              <div style={{fontSize:10,color:'#475569',marginBottom:5}}>EFT payment this night (optional):</div>
              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                <span style={{color:'#94A3B8',fontSize:14}}>€</span>
                <input type="number" step="0.01" placeholder="0.00" defaultValue={eftEntered>0?eftEntered:''} key={`${night.id}-${rider}-${eftEntered}`} onBlur={ev=>updPay(rider,ev.target.value)} style={{flex:1,background:'#1E293B',border:`1px solid ${solid}55`,borderRadius:8,padding:'7px 10px',color:'#FFFFFF',fontSize:14}}/>
                {eftEntered>0&&<span style={{fontSize:11,padding:'3px 8px',borderRadius:8,background:'#1D4ED8',color:'#FFFFFF',fontWeight:600}}>EFT</span>}
              </div>
            </div>);
          })}
          {!isAdm&&night.group.filter(r=>r!==identity).map(rider=>{const{perNight:pr}=calcDrawdown(rider,nights,deposits[rider]||0);const rd=pr[night.id];const covered=rd?.covered;const depUsed=rd?.depositUsed||0;const eftAmt=rd?.eftAmount||0;return(<div key={rider} style={{display:'flex',alignItems:'center',gap:8,marginBottom:6,background:'#1E293B55',borderRadius:8,padding:'8px 10px',opacity:.7}}><div style={{width:28,height:28,borderRadius:'50%',background:RC[rider].solid,display:'flex',alignItems:'center',justifyContent:'center',fontSize:11,fontWeight:700,color:'#FFFFFF',flexShrink:0}}>{rider[0]}</div><div style={{flex:1,fontSize:12,color:'#CBD5E1',fontWeight:500}}>{rider}</div><div style={{fontSize:11,color:covered?'#10B981':depUsed>0||eftAmt>0?'#F59E0B':'#64748B',fontWeight:600}}>{covered?'Covered':depUsed>0?`Dep ${ef(depUsed)}`:eftAmt>0?`EFT ${ef(eftAmt)}`:'Pending'}</div></div>);})}
          {isAdm&&RIDERS.filter(r=>!night.group.includes(r)).length>0&&<div style={{fontSize:11,color:'#334155',marginTop:4}}>Not present: {RIDERS.filter(r=>!night.group.includes(r)).join(', ')}</div>}
        </div>
      )}
    </div>
  );
}

function PeopleTab({riders,pSum,deposits,updateDeposit,identity,role,nights,fuel}){

  return(
    <div style={{padding:'12px'}}>

        <RiderCard key={rider} rider={rider} identity={identity} role={role}
          nights={nights} fuel={fuel}
          deposit={deposits[rider]||0}
          updateDeposit={updateDeposit}
          s={pSum(rider)}
          openFuel={openFuel} setOpenFuel={setOpenFuel}
        />
      ))}

}

  const canEdit=role==='admin'||isMe;

  const fuelSettled=Math.abs(fuelNet)<0.01;
  return(
    <div style={{background:'#141C27',border:`1.5px solid ${isMe?solid:'#1E293B'}`,borderRadius:12,padding:14,marginBottom:10}}>
      <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:12}}>
        <div style={{width:38,height:38,borderRadius:'50%',background:solid,display:'flex',alignItems:'center',justifyContent:'center',fontSize:15,fontWeight:700,color:'#FFFFFF',flexShrink:0}}>{rider[0]}</div>
        <div style={{flex:1}}>
          <div style={{display:'flex',alignItems:'center',gap:6}}>
            <div style={{fontSize:16,fontWeight:700,color:'#FFFFFF'}}>{rider}</div>
            {isMe&&<span style={{fontSize:9,padding:'2px 7px',borderRadius:10,background:solid,color:'#FFFFFF',fontWeight:700,border:'1px solid rgba(255,255,255,0.5)'}}>you</span>}
          </div>
          <div style={{fontSize:11,color:'#475569',marginTop:1}}>{s.count} nights</div>
        </div>
      </div>
      <div style={{background:'#0F172A55',borderRadius:10,padding:'10px 12px',marginBottom:8,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div><div style={{fontSize:10,color:'#64748B',marginBottom:2}}>Accommodation balance</div><div style={{fontSize:10,color:'#475569'}}>Share: {ef(s.actualShare)} · Covered: {ef(s.totalCovered)}</div></div>
        <div style={{fontSize:18,fontWeight:700,color:settled?'#10B981':s.balance>0?'#F87171':'#10B981',textAlign:'right'}}>{settled?'Settled':ef(s.balance)}</div>
      </div>
      <div style={{background:'#0F172A55',borderRadius:10,padding:'10px 12px',marginBottom:10,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <div><div style={{fontSize:10,color:'#64748B',marginBottom:2}}>Fuel net position</div><div style={{fontSize:10,color:'#475569'}}>{fuelSettled?'All square':'Settle at group phase change'}</div></div>
        <div style={{fontSize:16,fontWeight:700,color:fuelSettled?'#10B981':fuelNet>0?'#6EE7B7':'#F87171',textAlign:'right'}}>{fuelSettled?'Even':fuelNet>0?`Owed ${ef(fuelNet)}`:`Owes ${ef(Math.abs(fuelNet))}`}</div>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6,marginBottom:10}}>
        {[{l:'Deposit held',v:ef(deposit)},{l:'Deposit used',v:ef(s.depositUsed)},{l:'Deposit left',v:ef(s.depositRemaining),warn:s.depositRemaining<50&&deposit>0},{l:'Via EFT',v:ef(s.eftTotal)}].map(({l,v,warn})=>(
          <div key={l} style={{background:'#0F172A55',borderRadius:8,padding:'8px'}}>
            <div style={{fontSize:9,color:'#475569',marginBottom:2}}>{l}</div>
            <div style={{fontSize:13,fontWeight:600,color:warn?'#F87171':'#F1F5F9'}}>{v}</div>
          </div>
        ))}
      </div>
      {s.depositRemaining<50&&s.depositRemaining>0&&deposit>0&&<div style={{fontSize:11,color:'#F87171',background:'#2D0A0A',borderRadius:8,padding:'7px 10px',marginBottom:10,fontWeight:600}}>Deposit running low — {ef(s.depositRemaining)} remaining</div>}
      {s.balance>0&&s.depositRemaining<=0&&deposit>0&&<div style={{fontSize:11,color:'#F87171',background:'#2D0A0A',borderRadius:8,padding:'7px 10px',marginBottom:10,fontWeight:600}}>Deposit exhausted — {ef(s.balance)} still outstanding</div>}
      <div style={{background:'#0F172A55',borderRadius:8,padding:'10px',marginBottom:10}}>
        <div style={{fontSize:11,color:'#F59E0B',fontWeight:600,marginBottom:6}}>PRE-TOUR DEPOSIT</div>
        {canEdit?(<div style={{display:'flex',alignItems:'center',gap:8}}><span style={{color:'#F59E0B',fontSize:16}}>€</span><input type="number" step="0.01" defaultValue={deposit||''} key={`dep-${rider}-${deposit}`} placeholder="0.00" onBlur={ev=>updateDeposit(rider,ev.target.value)} style={{flex:1,background:'#1E293B',border:'1px solid #F59E0B44',borderRadius:8,padding:'8px 12px',color:'#FCD34D',fontSize:16,fontWeight:600}}/></div>

    </div>
  );
}


function AccomLedger({rider,nights,deposit}){
  const {perNight}=calcDrawdown(rider,nights,deposit);
  const lines=[{sortKey:'0000',type:'open',label:'Opening balance',amount:0}];
  nights.filter(n=>n.group.includes(rider)).sort((a,b)=>a.date.localeCompare(b.date)).forEach(n=>{
    const nd=perNight[n.id];
    if(!nd)return;
    if(nd.share>0) lines.push({date:n.date,sortKey:n.date+'-1',type:'debit',label:n.property,amount:nd.share});
    if(nd.depositUsed>0) lines.push({date:n.date,sortKey:n.date+'-2',type:'credit',label:'Deposit applied',amount:nd.depositUsed});
    if(nd.eftAmount>0) lines.push({date:n.date,sortKey:n.date+'-3',type:'credit',label:'EFT received',amount:nd.eftAmount});
  });
  lines.sort((a,b)=>a.sortKey.localeCompare(b.sortKey));
  let running=0;
  const rendered=lines.map(l=>{if(l.type==='open')return{...l,running:0};if(l.type==='credit')running-=l.amount;else running+=l.amount;return{...l,running};});
  const final=rendered[rendered.length-1]?.running||0;
  const fmtShort=s=>new Date(s+'T12:00:00').toLocaleDateString('en-GB',{day:'numeric',month:'short'});
  return(
    <div style={{marginTop:10,background:'#0A0F1A',borderRadius:10,overflow:'hidden',border:'1px solid #1E293B33'}}>
      <div style={{padding:'6px 10px',background:'#1E293B',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontSize:10,color:'#94A3B8',fontWeight:600,letterSpacing:'.06em'}}>ACCOMMODATION LEDGER</span>
        <span style={{fontSize:11,fontWeight:700,color:Math.abs(final)<0.01?'#10B981':final>0?'#F87171':'#86EFAC'}}>{Math.abs(final)<0.01?'Settled':ef(final)}</span>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'52px 1fr 64px 64px',gap:4,padding:'5px 10px',background:'#141C27',fontSize:9,color:'#475569',fontWeight:600,letterSpacing:'.05em'}}>
        <div>DATE</div><div>DESCRIPTION</div><div style={{textAlign:'right'}}>AMOUNT</div><div style={{textAlign:'right'}}>BALANCE</div>
      </div>
      {rendered.map((l,i)=>{
        const isCredit=l.type==='credit';
        const balCol=l.running>0.01?'#F87171':l.running<-0.01?'#86EFAC':'#6EE7B7';
        return(<div key={i} style={{display:'grid',gridTemplateColumns:'52px 1fr 64px 64px',gap:4,padding:'6px 10px',borderBottom:'1px solid #1E293B33',background:i%2===0?'transparent':'#0F172A33'}}>
          <div style={{fontSize:10,color:'#475569'}}>{l.type==='open'?'—':fmtShort(l.date)}</div>
          <div style={{fontSize:11,color:isCredit?'#86EFAC':'#CBD5E1',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{l.label}</div>
          <div style={{fontSize:11,fontWeight:600,color:isCredit?'#86EFAC':l.type==='debit'?'#FCA5A5':'#475569',textAlign:'right'}}>{l.type==='open'?'—':`${isCredit?'-':'+'}${ef(l.amount)}`}</div>
          <div style={{fontSize:11,fontWeight:700,color:l.type==='open'?'#475569':balCol,textAlign:'right'}}>{ef(l.running)}</div>
        </div>);
      })}
    </div>
  );
}

function FuelLedger({rider,fuel,border,bg}){
  const entries=(fuel||[]).filter(e=>e.ridersPresent&&e.ridersPresent.includes(rider)).sort((a,b)=>a.date.localeCompare(b.date));
  if(entries.length===0){return(<div style={{marginTop:10,background:'#0A0F1A',borderRadius:10,overflow:'hidden',border:'1px solid #F59E0B22'}}><div style={{padding:'6px 10px',background:'#1C1500',display:'flex',justifyContent:'space-between',alignItems:'center'}}><span style={{fontSize:10,color:'#F59E0B',fontWeight:600,letterSpacing:'.06em'}}>⛽ FUEL LEDGER</span><span style={{fontSize:11,fontWeight:700,color:'#10B981'}}>Even</span></div><div style={{padding:'20px',textAlign:'center',color:'#475569',fontSize:12}}>No fuel entries yet for {rider}</div></div>);}
  let running=0;
  const lines=entries.map(e=>{const share=(e.totalCost||0)/(e.ridersPresent.length||1);const isPump=e.pumpPerson===rider;const amount=isPump?(e.totalCost||0)-share:share;if(isPump)running-=amount;else running+=amount;return{e,share,isPump,amount,running};});
  const final=running;
  return(
    <div style={{marginTop:10,background:'#0A0F1A',borderRadius:10,overflow:'hidden',border:'1px solid #F59E0B22'}}>
      <div style={{padding:'6px 10px',background:'#1C1500',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
        <span style={{fontSize:10,color:'#F59E0B',fontWeight:600,letterSpacing:'.06em'}}>⛽ FUEL LEDGER</span>
        <span style={{fontSize:11,fontWeight:700,color:Math.abs(final)<0.01?'#10B981':final>0?'#F87171':'#6EE7B7'}}>{Math.abs(final)<0.01?'Even':final>0?`Owes ${ef(final)}`:`Owed ${ef(Math.abs(final))}`}</span>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'52px 1fr 64px 64px',gap:4,padding:'5px 10px',background:'#141C27',fontSize:9,color:'#475569',fontWeight:600,letterSpacing:'.05em'}}>
        <div>DATE</div><div>DESCRIPTION</div><div style={{textAlign:'right'}}>AMOUNT</div><div style={{textAlign:'right'}}>POSITION</div>
      </div>
      {lines.map(({e,share,isPump,amount,running:r},i)=>{const posCol=r>0.01?'#F87171':r<-0.01?'#6EE7B7':'#10B981';
        return(<div key={e.id} style={{display:'grid',gridTemplateColumns:'52px 1fr 64px 64px',gap:4,padding:'6px 10px',borderBottom:'1px solid #1C1500',background:i%2===0?'transparent':'#0F172A33'}}>
          <div style={{fontSize:10,color:'#475569'}}>{fmtShort(e.date)}</div>
          <div style={{fontSize:11,lineHeight:1.3}}><div style={{color:isPump?'#6EE7B7':'#FCD34D'}}>{isPump?`Pump duty (${e.ridersPresent.length} bikes)`:`Stop — pump: ${e.pumpPerson}`}</div><div style={{fontSize:9,color:'#475569',marginTop:1}}>{ef(share)}/bike · total {ef(e.totalCost)}</div></div>
          <div style={{fontSize:11,fontWeight:600,color:isPump?'#6EE7B7':'#FCA5A5',textAlign:'right'}}>{isPump?`−${ef(amount)}`:`+${ef(amount)}`}</div>
          <div style={{fontSize:11,fontWeight:700,color:posCol,textAlign:'right'}}>{ef(Math.abs(r))}{r>0.01?' ↑':r<-0.01?' ↓':' ✓'}</div>
        </div>);
      })}
      <div style={{padding:'7px 10px',background:'#1C1500',display:'grid',gridTemplateColumns:'52px 1fr 64px 64px',gap:4}}>
        <div/><div style={{fontSize:11,color:'#64748B',fontWeight:600}}>Net position</div><div/>
        <div style={{fontSize:12,fontWeight:700,color:Math.abs(final)<0.01?'#10B981':final>0?'#F87171':'#6EE7B7',textAlign:'right'}}>{Math.abs(final)<0.01?'Even':final>0?`Owes ${ef(final)}`:`Owed ${ef(Math.abs(final))}`}</div>
      </div>
    </div>
  );
}

function FuelTab({fuel,role,identity,addFuelEntry,deleteFuelEntry}){
  const [showAdd,setShowAdd]=useState(false);
  const [form,setForm]=useState({date:'',pumpPerson:identity,totalCost:'',ridersPresent:['Steve','Derek','Terry']});
  const [done,setDone]=useState(false);
  const isAdmin=role==='admin';
  const setF=(k,v)=>setForm(f=>({...f,[k]:v}));
  const toggleRider=r=>setForm(f=>({...f,ridersPresent:f.ridersPresent.includes(r)?f.ridersPresent.filter(x=>x!==r):[...f.ridersPresent,r]}));
  const sorted=[...(fuel||[])].sort((a,b)=>a.date.localeCompare(b.date)).reverse();
  const grandTotal=sorted.reduce((s,e)=>s+(e.totalCost||0),0);
  const submit=()=>{
    if(!form.date||!form.totalCost||form.ridersPresent.length===0)return;
    const pump=isAdmin?form.pumpPerson:identity;
    const total=parseFloat(form.totalCost)||0;
    addFuelEntry({date:form.date,pumpPerson:pump,totalCost:total,ridersPresent:[...form.ridersPresent],costPerBike:total/(form.ridersPresent.length||1)});
    setDone(true);
    setTimeout(()=>{setDone(false);setForm({date:'',pumpPerson:identity,totalCost:'',ridersPresent:['Steve','Derek','Terry']});setShowAdd(false);},1000);
  };
  return(
    <div style={{padding:'10px 12px'}}>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:12}}>
        <div style={{background:'#1A1200',border:'1px solid #F59E0B33',borderRadius:10,padding:'10px 12px'}}>
          <div style={{fontSize:10,color:'#94A3B8',marginBottom:2}}>Total fuel spend</div>
          <div style={{fontSize:20,fontWeight:700,color:'#FCD34D'}}>{ef(grandTotal)}</div>
          <div style={{fontSize:10,color:'#64748B',marginTop:1}}>{sorted.length} stops</div>
        </div>
        <div style={{background:'#1E293B',border:'1px solid #334155',borderRadius:10,padding:'10px 12px'}}>
          <div style={{fontSize:10,color:'#94A3B8',marginBottom:4}}>Pump duty</div>
          {RIDERS.map(r=>{const cnt=fuelPumpCount(r,fuel);if(cnt===0)return null;return(<div key={r} style={{display:'flex',justifyContent:'space-between',fontSize:11,color:'#CBD5E1',marginBottom:2}}><span style={{color:RC[r].dark}}>{r}</span><span style={{fontWeight:600}}>{cnt}×</span></div>);})}
          {sorted.length===0&&<div style={{fontSize:11,color:'#475569'}}>No entries yet</div>}
        </div>
      </div>
      <div style={{marginBottom:12}}>
        <div style={{fontSize:11,color:'#64748B',fontWeight:600,letterSpacing:'.06em',marginBottom:8}}>NET FUEL POSITIONS</div>
        <div style={{background:'#141C27',borderRadius:10,overflow:'hidden',border:'1px solid #1E293B'}}>
          {RIDERS.map((r,i)=>{const net=fuelNetPosition(r,fuel);const settled=Math.abs(net)<0.01;const{dark,border,bg}=RC[r];
            return(<div key={r} style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'9px 12px',borderBottom:i<RIDERS.length-1?'1px solid #1E293B44':'none',background:r===identity?bg+'11':'transparent'}}>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <div style={{width:28,height:28,borderRadius:'50%',background:RC[r].solid,display:'flex',alignItems:'center',justifyContent:'center',fontSize:12,fontWeight:700,color:'#FFFFFF'}}>{r[0]}</div>
                <span style={{fontSize:13,color:'#FFFFFF',fontWeight:r===identity?700:400}}>{r}</span>
              </div>
              <div style={{textAlign:'right'}}>
                <div style={{fontSize:13,fontWeight:700,color:settled?'#10B981':net>0?'#6EE7B7':'#F87171'}}>{settled?'Even':net>0?`Owed ${ef(net)}`:`Owes ${ef(Math.abs(net))}`}</div>
                <div style={{fontSize:9,color:'#475569',marginTop:1}}>{settled?'':net>0?'group owes them':'they owe group'}</div>
              </div>
            </div>);
          })}
        </div>
      </div>
      <button onClick={()=>setShowAdd(!showAdd)} style={{width:'100%',padding:'11px',borderRadius:10,border:'none',background:showAdd?'#1E293B':'#F59E0B',color:showAdd?'#64748B':'#0F172A',fontSize:14,fontWeight:700,cursor:'pointer',marginBottom:showAdd?0:12}}>
        {showAdd?'Cancel':`+ Log Fuel Stop (as ${identity})`}
      </button>
      {showAdd&&(
        <div style={{background:'#1C1A0F',border:'1px solid #F59E0B44',borderRadius:12,padding:14,marginBottom:12,marginTop:8}}>
          <div style={{fontSize:12,color:'#F59E0B',fontWeight:600,marginBottom:4,letterSpacing:'.06em'}}>NEW FUEL ENTRY</div>
          {!isAdmin&&(<div style={{background:'#0F172A',borderRadius:8,padding:'8px 12px',marginBottom:12,display:'flex',alignItems:'center',gap:8}}>
            <div style={{width:28,height:28,borderRadius:'50%',background:RC[identity].solid,display:'flex',alignItems:'center',justifyContent:'center',fontSize:13,fontWeight:700,color:'#FFFFFF',flexShrink:0}}>{identity[0]}</div>
            <div><div style={{fontSize:12,fontWeight:600,color:'#FFFFFF'}}>You are the pump person</div><div style={{fontSize:10,color:'#64748B',marginTop:1}}>Only log stops where you paid at the pump</div></div>
          </div>)}
          {[{l:'Date *',k:'date',t:'date'},{l:'Total cost €',k:'totalCost',t:'number',p:'0.00'}].map(f=>(<div key={f.k} style={{marginBottom:10}}><div style={{fontSize:11,color:'#94A3B8',marginBottom:4}}>{f.l}</div><input type={f.t} value={form[f.k]} placeholder={f.p||''} onChange={ev=>setF(f.k,ev.target.value)} style={{width:'100%',background:'#0F172A',border:'1px solid #334155',borderRadius:8,padding:'9px 12px',color:'#F1F5F9',fontSize:14}}/></div>))}
          {isAdmin&&(<div style={{marginBottom:10}}><div style={{fontSize:11,color:'#94A3B8',marginBottom:4}}>Pump person</div><div style={{display:'flex',gap:6,flexWrap:'wrap'}}>{RIDERS.map(r=>(<button key={r} onClick={()=>setF('pumpPerson',r)} style={{padding:'5px 10px',borderRadius:20,border:'none',background:RC[r].solid,color:'#FFFFFF',fontSize:12,fontWeight:700,cursor:'pointer',boxShadow:form.pumpPerson===r?'0 0 0 2px #FFFFFF':'none'}}>{r}</button>))}</div></div>)}
          <div style={{marginBottom:12}}>
            <div style={{fontSize:11,color:'#94A3B8',marginBottom:4}}>Riders present (tick all bikes at this stop)</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:6}}>
              {RIDERS.map(r=>{const checked=form.ridersPresent.includes(r);return(<button key={r} onClick={()=>toggleRider(r)} style={{padding:'8px 10px',borderRadius:8,border:'none',background:RC[r].solid,color:'#FFFFFF',fontSize:12,fontWeight:700,cursor:'pointer',display:'flex',alignItems:'center',gap:6,boxShadow:checked?'0 0 0 2px #FFFFFF':'none'}}>
                <span style={{width:14,height:14,borderRadius:3,background:checked?'rgba(255,255,255,0.3)':'rgba(0,0,0,0.2)',border:'1.5px solid rgba(255,255,255,0.7)',display:'inline-flex',alignItems:'center',justifyContent:'center',flexShrink:0,fontSize:10,color:'white',fontWeight:700}}>{checked?'✓':''}</span>{r}
              </button>);})}
            </div>
          </div>
          {form.totalCost&&form.ridersPresent.length>0&&(<div style={{background:'#0F172A',borderRadius:8,padding:'10px',marginBottom:12,display:'flex',justifyContent:'space-between'}}><span style={{fontSize:12,color:'#64748B'}}>{form.ridersPresent.length} bikes · per bike</span><span style={{fontSize:16,fontWeight:700,color:'#FCD34D'}}>{ef((parseFloat(form.totalCost)||0)/form.ridersPresent.length)}</span></div>)}
          <button onClick={submit} disabled={!form.date||!form.totalCost||form.ridersPresent.length===0} style={{width:'100%',padding:'12px',borderRadius:10,border:'none',background:done?'#10B981':(!form.date||!form.totalCost||form.ridersPresent.length===0)?'#1E293B':'#F59E0B',color:(!form.date||!form.totalCost||form.ridersPresent.length===0)?'#475569':'#0F172A',fontSize:14,fontWeight:700,cursor:'pointer',transition:'background .2s'}}>
            {done?'✓ Logged!':'Log Fuel Stop'}
          </button>
        </div>
      )}
      <div style={{fontSize:11,color:'#64748B',fontWeight:600,letterSpacing:'.06em',marginBottom:8,marginTop:12}}>FUEL LOG</div>
      {sorted.length===0&&(<div style={{textAlign:'center',padding:'30px 20px',color:'#475569',background:'#141C27',borderRadius:10,border:'1px solid #1E293B'}}><div style={{fontSize:24,marginBottom:8}}>⛽</div><div style={{fontSize:13,marginBottom:4}}>No fuel entries yet</div><div style={{fontSize:11}}>Tap the button above to log the first stop</div></div>)}
      {sorted.map(entry=>{const cpb=(entry.totalCost||0)/(entry.ridersPresent?.length||1);
        return(<div key={entry.id} style={{background:'#141C27',border:'1px solid #1E293B',borderRadius:10,padding:'12px',marginBottom:8}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:8}}>
            <div><div style={{fontSize:13,fontWeight:600,color:'#FCD34D'}}>{fmtD(entry.date)}</div><div style={{fontSize:11,color:'#64748B',marginTop:4,display:'flex',alignItems:'center',gap:6}}>Pump: <span style={{fontSize:11,padding:'2px 9px',borderRadius:10,background:RC[entry.pumpPerson]?.solid||'#475569',color:'#FFFFFF',fontWeight:700}}>{entry.pumpPerson}</span></div></div>
            <div style={{textAlign:'right'}}><div style={{fontSize:16,fontWeight:700,color:'#F8FAFC'}}>{ef(entry.totalCost)}</div><div style={{fontSize:11,color:'#64748B'}}>{ef(cpb)} / bike</div></div>
          </div>
          <div style={{display:'flex',gap:6,flexWrap:'wrap',marginBottom:isAdmin?8:0}}>
            {(entry.ridersPresent||[]).map(r=>(<span key={r} style={{fontSize:11,padding:'3px 9px',borderRadius:10,background:RC[r].solid,color:'#FFFFFF',fontWeight:600}}>{r}</span>))}
          </div>
          {isAdmin&&(<button onClick={()=>{if(window.confirm('Delete this fuel entry?'))deleteFuelEntry(entry.id);}} style={{fontSize:11,padding:'4px 8px',borderRadius:6,border:'1px solid #EF444433',background:'none',color:'#F87171',cursor:'pointer'}}>Delete</button>)}
        </div>);
      })}
    </div>
  );
}

function MyBalanceTab({identity,summary,fuelNet}){
  const {solid}=RC[identity];
  const settled=Math.abs(summary.balance)<0.01;
  const fuelSettled=Math.abs(fuelNet)<0.01;
  return(
    <div style={{padding:'20px 16px'}}>
      {/* FIX 4: Avatar — solid colour + white initial, consistent with rest of app */}
      <div style={{textAlign:'center',marginBottom:24}}>
        <div style={{width:72,height:72,borderRadius:'50%',background:solid,display:'flex',alignItems:'center',justifyContent:'center',fontSize:28,fontWeight:700,color:'#FFFFFF',margin:'0 auto 10px',boxShadow:`0 0 0 3px #FFFFFF`}}>{identity[0]}</div>
        <div style={{fontSize:20,fontWeight:700,color:'#FFFFFF'}}>{identity}</div>
      </div>

      {/* FIX 5: Bigger, bolder section headings */}
      <div style={{fontSize:13,color:'#FFFFFF',fontWeight:700,letterSpacing:'.06em',marginBottom:10}}>🏨 ACCOMMODATION</div>
      <div style={{background:'#141C27',border:`1px solid ${solid}55`,borderRadius:14,padding:16,textAlign:'center',marginBottom:10}}>
        <div style={{fontSize:12,color:'#94A3B8',marginBottom:6}}>Balance owing Terry</div>
        <div style={{fontSize:32,fontWeight:800,color:settled?'#10B981':summary.balance>0?'#F87171':'#10B981'}}>{settled?'All settled ✓':ef(summary.balance)}</div>
      </div>

      {/* FIX 3+6: White text, updated labels using new pSum fields */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:20}}>
        {[
          {l:'Nights',         v:String(summary.count)},
          {l:'Budget share',   v:ef(summary.budgetShare)},
          {l:'Actual share',   v:ef(summary.actualShare)},
          {l:'Deposit held',   v:ef(summary.deposit)},
          {l:'Deposit used',   v:ef(summary.depositUsed)},
          {l:'Paid via EFT',   v:ef(summary.eftTotal)},
        ].map(({l,v})=>(
          <div key={l} style={{background:'#141C27',border:'1px solid #1E293B',borderRadius:10,padding:'12px'}}>
            <div style={{fontSize:11,color:'#94A3B8',marginBottom:4}}>{l}</div>
            <div style={{fontSize:15,fontWeight:600,color:'#FFFFFF'}}>{v}</div>
          </div>
        ))}
      </div>

      <div style={{borderTop:'1px solid #1E293B',marginBottom:16}}/>

      {/* FIX 5: Bigger fuel heading */}
      <div style={{fontSize:13,color:'#F59E0B',fontWeight:700,letterSpacing:'.06em',marginBottom:10}}>⛽ FUEL</div>
      <div style={{background:'#1A1200',border:'1px solid #F59E0B44',borderRadius:14,padding:16,textAlign:'center',marginBottom:10}}>
        <div style={{fontSize:12,color:'#94A3B8',marginBottom:6}}>Net position with group</div>
        <div style={{fontSize:32,fontWeight:800,color:fuelSettled?'#10B981':fuelNet>0?'#6EE7B7':'#F87171'}}>{fuelSettled?'Even':ef(Math.abs(fuelNet))}</div>
        {!fuelSettled&&<div style={{fontSize:11,color:'#94A3B8',marginTop:6}}>{fuelNet>0?'The group owes you — settle at next phase change':'You owe the group — settle at next phase change'}</div>}
      </div>

      <div style={{background:'#141C27',border:'1px solid #1E293B',borderRadius:10,padding:'12px',fontSize:12,color:'#94A3B8',lineHeight:1.5}}>To log a payment, open the Nights tab and enter the amount in your payment row.</div>
    </div>
  );
}


function AddTab({addNight,setTab}){
  const [form,setForm]=useState({date:'',property:'',location:'',country:'FR',bookingCost:'',notes:''});
  const [done,setDone]=useState(false);
  const set=(k,v)=>setForm(f=>({...f,[k]:v}));
  const submit=()=>{
    if(!form.date)return;
    addNight({date:form.date,property:form.property||'TBD',location:form.location||'',country:form.country||'',bookingCost:parseFloat(form.bookingCost)||0,notes:form.notes||''});
    setDone(true);
    setTimeout(()=>{setDone(false);setForm({date:'',property:'',location:'',country:'FR',bookingCost:'',notes:''});setTab('nights');},1000);
  };
  return(
    <div style={{padding:'16px 12px'}}>
      <div style={{fontSize:13,color:'#64748B',marginBottom:16,lineHeight:1.5}}>Add a return leg night. Steve, Derek & Terry assigned automatically.</div>
      {[{l:'Date *',k:'date',t:'date'},{l:'Property',k:'property',t:'text',p:'Hotel / TBD'},{l:'Location',k:'location',t:'text',p:'City, Region'},{l:'Country',k:'country',t:'text',p:'FR / IT / DE...'},{l:'Booking cost €',k:'bookingCost',t:'number',p:'0.00'},{l:'Notes',k:'notes',t:'text',p:'Route notes, ref...'}].map(f=>(
        <div key={f.k} style={{marginBottom:12}}><div style={{fontSize:11,color:'#94A3B8',marginBottom:5,fontWeight:500}}>{f.l}</div><input type={f.t} value={form[f.k]} placeholder={f.p||''} onChange={ev=>set(f.k,ev.target.value)} style={{width:'100%',background:'#1E293B',border:'1px solid #334155',borderRadius:10,padding:'11px 14px',color:'#F1F5F9',fontSize:14}}/></div>
      ))}
      <div style={{background:'#1E293B',borderRadius:10,padding:'10px 14px',marginBottom:16,display:'flex',gap:8}}>
        {['Steve','Derek','Terry'].map(r=><span key={r} style={{fontSize:12,padding:'3px 8px',borderRadius:12,background:RC[r].bg+'44',color:RC[r].dark,border:`1px solid ${RC[r].border}44`}}>{r}</span>)}
      </div>
      <button onClick={submit} disabled={!form.date} style={{width:'100%',padding:'14px',borderRadius:12,border:'none',cursor:'pointer',background:done?'#10B981':form.date?'#3B82F6':'#1E293B',color:form.date?'white':'#475569',fontSize:15,fontWeight:700,transition:'background .2s'}}>
        {done?'✓ Added!':'Add Night'}
      </button>
    </div>
  );
}

root.render(React.createElement(App));
if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('./sw.js').catch(console.error);});}
