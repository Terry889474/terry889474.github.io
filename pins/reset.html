<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Database</title>
  <style>
    body { 
      background: #0f172a; 
      color: white; 
      font-family: sans-serif; 
      padding: 20px;
      max-width: 600px;
      margin: 0 auto;
    }
    button { 
      background: #dc2626; 
      color: white; 
      border: none; 
      padding: 15px 30px; 
      font-size: 16px;
      border-radius: 8px;
      cursor: pointer;
      margin: 10px 0;
      width: 100%;
    }
    button:hover { background: #b91c1c; }
    .success { background: #059669; padding: 15px; border-radius: 8px; margin: 10px 0; }
    .warning { background: #f59e0b; color: #000; padding: 15px; border-radius: 8px; margin: 10px 0; }
  </style>
</head>
<body>
  <h1>🔧 Reset Pins Database</h1>
  <div class="warning">
    <strong>WARNING:</strong> This will delete ALL data in the pins database!<br>
    Only use this to clear test data before the trip.
  </div>
  
  <div id="status"></div>
  
  <button onclick="resetDatabase()">🗑️ RESET ALL PINS DATA</button>
  <button onclick="window.location.href='index.html'">← Back to App</button>
  
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
  
  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyBOXKNZupe6KYLqHS4DqGJnKGG0u4OI_N4",
      authDomain: "eurotrash-2026.firebaseapp.com",
      databaseURL: "https://eurotrash-2026-default-rtdb.firebaseio.com",
      projectId: "eurotrash-2026",
      storageBucket: "eurotrash-2026.appspot.com",
      messagingSenderId: "123456789",
      appId: "1:123456789:web:abcdef123456"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    async function resetDatabase() {
      if (!confirm('Are you ABSOLUTELY SURE you want to delete all pins data?')) {
        return;
      }
      
      if (!confirm('This cannot be undone. Delete everything?')) {
        return;
      }
      
      try {
        document.getElementById('status').innerHTML = 'Deleting...';
        
        // Delete everything under pins/
        await db.ref('pins').remove();
        
        // Initialize fresh structure
        await db.ref('pins').set({
          riders: {
            Terry: { violations: 0, fines: 0, credits: 0, awards: 0, assistantDays: 0, pins: {} },
            Steve: { violations: 0, fines: 0, credits: 0, awards: 0, assistantDays: 0, pins: {} },
            Derek: { violations: 0, fines: 0, credits: 0, awards: 0, assistantDays: 0, pins: {} },
            Mark: { violations: 0, fines: 0, credits: 0, awards: 0, assistantDays: 0, pins: {} },
            Ant: { violations: 0, fines: 0, credits: 0, awards: 0, assistantDays: 0, pins: {} },
            Charles: { violations: 0, fines: 0, credits: 0, awards: 0, assistantDays: 0, pins: {} }
          },
          kitty: 0,
          activities: {},
          dailyQuote: null,
          dailyBorat: null,
          assistantSupervisor: null
        });
        
        document.getElementById('status').innerHTML = '<div class="success">✅ Database reset complete! All data cleared.</div>';
      } catch (error) {
        document.getElementById('status').innerHTML = '<div style="background: #dc2626; padding: 15px; border-radius: 8px;">ERROR: ' + error.message + '</div>';
      }
    }
  </script>
</body>
</html>
