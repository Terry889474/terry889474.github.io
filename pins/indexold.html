<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>EuroTrash Pins 2026</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icon-192.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      padding-bottom: 80px;
    }
    
    .app-container {
      max-width: 600px;
      margin: 0 auto;
    }
    
    .header {
      background: linear-gradient(135deg, #7c3aed 0%, #ec4899 100%);
      padding: 20px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
    
    .header h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    
    .header p {
      font-size: 13px;
      opacity: 0.9;
    }
    
    .tabs {
      display: flex;
      background: #1e293b;
      border-bottom: 2px solid #334155;
      position: sticky;
      top: 72px;
      z-index: 99;
      overflow-x: auto;
    }
    
    .tab {
      flex: 1;
      padding: 14px 8px;
      text-align: center;
      background: none;
      border: none;
      color: #94a3b8;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      white-space: nowrap;
      min-width: 80px;
    }
    
    .tab.active {
      color: #ec4899;
    }
    
    .tab.active::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 2px;
      background: #ec4899;
    }
    
    .content {
      padding: 16px;
    }
    
    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid #334155;
    }
    
    .leaderboard-item {
      display: flex;
      align-items: center;
      padding: 12px;
      background: #1e293b;
      border-radius: 8px;
      margin-bottom: 8px;
      border: 1px solid #334155;
    }
    
    .leaderboard-item.assistant {
      border: 2px solid #f59e0b;
      background: #1e1b16;
    }
    
    .rank {
      font-size: 20px;
      font-weight: 700;
      width: 40px;
      text-align: center;
      color: #7c3aed;
    }
    
    .rider-info {
      flex: 1;
      margin-left: 12px;
    }
    
    .rider-name {
      font-weight: 600;
      font-size: 16px;
      margin-bottom: 4px;
    }
    
    .assistant-badge {
      display: inline-block;
      background: #3b82f6;
      color: #fff;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      margin-left: 6px;
      text-transform: uppercase;
    }
    
    .rider-stats {
      font-size: 13px;
      color: #94a3b8;
    }
    
    .fines-total {
      font-size: 18px;
      font-weight: 700;
      color: #ef4444;
      text-align: right;
    }
    
    .pin-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      margin: 2px;
      background: #334155;
    }
    
    .pin-badge.positive {
      background: #059669;
      color: white;
    }
    
    .pin-badge.negative {
      background: #dc2626;
      color: white;
    }
    
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 12px;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #7c3aed 0%, #ec4899 100%);
      color: white;
    }
    
    .btn-primary:active {
      transform: scale(0.98);
    }
    
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .btn-secondary {
      background: #334155;
      color: #e2e8f0;
    }
    
    .btn-success {
      background: #059669;
      color: white;
    }
    
    .btn-danger {
      background: #dc2626;
      color: white;
    }
    
    .form-group {
      margin-bottom: 16px;
    }
    
    .form-label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      font-size: 14px;
      color: #cbd5e1;
    }
    
    .form-select,
    .form-input,
    .form-textarea {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 15px;
    }
    
    .form-textarea {
      resize: vertical;
      min-height: 80px;
    }
    
    .file-upload {
      display: block;
      width: 100%;
      padding: 40px;
      border: 2px dashed #334155;
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      background: #0f172a;
      transition: all 0.2s;
    }
    
    .file-upload:hover {
      border-color: #7c3aed;
      background: #1e293b;
    }
    
    .file-upload input {
      display: none;
    }
    
    .preview-image {
      max-width: 100%;
      border-radius: 8px;
      margin-top: 12px;
    }
    
    .activity-item {
      background: #1e293b;
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 10px;
      border-left: 4px solid #7c3aed;
    }
    
    .activity-item.violation {
      border-left-color: #ef4444;
    }
    
    .activity-item.award {
      border-left-color: #10b981;
    }
    
    .activity-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    
    .activity-type {
      font-weight: 700;
      font-size: 14px;
    }
    
    .activity-time {
      font-size: 12px;
      color: #64748b;
    }
    
    .activity-description {
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 8px;
    }
    
    .activity-photo {
      width: 100%;
      border-radius: 6px;
      margin-top: 8px;
    }
    
    .kitty-banner {
      background: linear-gradient(135deg, #059669 0%, #10b981 100%);
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      margin-bottom: 20px;
    }
    
    .kitty-label {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.9;
      margin-bottom: 4px;
    }
    
    .kitty-amount {
      font-size: 36px;
      font-weight: 700;
    }
    
    .quote-challenge-box {
      background: linear-gradient(135deg, #7c3aed 0%, #ec4899 100%);
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }
    
    .quote-status {
      text-align: center;
      font-size: 14px;
      margin-bottom: 12px;
      opacity: 0.9;
    }
    
    .quote-input {
      background: white;
      color: #000;
      padding: 16px;
      border-radius: 8px;
      font-size: 16px;
      text-align: center;
      border: none;
      width: 100%;
      margin-bottom: 12px;
    }
    
    .quote-submitted {
      background: rgba(255,255,255,0.2);
      padding: 16px;
      border-radius: 8px;
      text-align: center;
      margin-bottom: 12px;
    }
    
    .quote-result {
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      font-weight: 600;
      margin-top: 12px;
    }
    
    .quote-result.correct {
      background: #059669;
    }
    
    .quote-result.incorrect {
      background: #dc2626;
    }
    
    .duty-checklist {
      background: #1e293b;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    
    .duty-item {
      display: flex;
      align-items: center;
      padding: 12px;
      margin-bottom: 8px;
      background: #0f172a;
      border-radius: 6px;
    }
    
    .duty-checkbox {
      width: 24px;
      height: 24px;
      margin-right: 12px;
      cursor: pointer;
    }
    
    .duty-text {
      flex: 1;
      font-size: 14px;
    }
    
    .duty-item.checked {
      opacity: 0.5;
    }
    
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #64748b;
    }
    
    @media (max-width: 480px) {
      .header h1 {
        font-size: 20px;
      }
      
      .tab {
        font-size: 11px;
        padding: 12px 4px;
        min-width: 70px;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
  
  <script type="text/babel">
    const { useState, useEffect } = React;
    
    // Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyBOXKNZupe6KYLqHS4DqGJnKGG0u4OI_N4",
      authDomain: "eurotrash-2026.firebaseapp.com",
      databaseURL: "https://eurotrash-2026-default-rtdb.firebaseio.com",
      projectId: "eurotrash-2026",
      storageBucket: "eurotrash-2026.appspot.com",
      messagingSenderId: "123456789",
      appId: "1:123456789:web:abcdef123456"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    const RIDERS = ['Terry', 'Steve', 'Derek', 'Mark', 'Ant', 'Charles'];
    
    const RIDER_PINS = {
      'Terry': '202',
      'Steve': '347',
      'Derek': '825',
      'Mark': '691',
      'Ant': '514',
      'Charles': '738'
    };
    
    const PIN_CATEGORIES = {
      positive: [
        { id: 'borat', name: 'Borat - Very Nice', icon: '👍' }
      ],
      negative: [
        { id: 'country-member', name: 'Country Member', icon: '🤠' },
        { id: 'speeder', name: 'Speeder', icon: '🏍️' },
        { id: 'dumbfuckery', name: 'Dumbfuckery', icon: '🫪' }
      ]
    };
    
    const ASSISTANT_DUTIES = [
      { id: 'roll-call', text: 'Morning Roll Call - Check all badges', penalty: 5 },
      { id: 'tally', text: 'Keep running tally of fines during day', penalty: 5 },
      { id: 'photos', text: 'Ensure violation photos posted to WhatsApp', penalty: 5 },
      { id: 'summary', text: 'Read daily summary at dinner', penalty: 5 },
      { id: 'rituals', text: 'Lead humiliation rituals', penalty: 5 }
    ];
    
    const DEFAULT_QUOTES = [
      "I gotta see the candy first. Then I get in the van. I'm not stupid.",
      "Knowing better has never stopped me",
      "The beatings will continue until morale improves",
      "Stop screaming... I'm scared too",
      "Bad decisions make good stories",
      "Don't grow up - it's a trap",
      "That's a terrible idea. When do we start?",
      "In my defense I was left unsupervised",
      "Well if it isn't the consequences of my own actions",
      "I shaved my balls for this?",
      "It could always be worse",
      "If at first you don't succeed, try doing it the way I told you to"
    ];
    
    function App() {
      const [activeTab, setActiveTab] = useState('leaderboard');
      const [riders, setRiders] = useState({});
      const [activities, setActivities] = useState([]);
      const [kittyTotal, setKittyTotal] = useState(0);
      const [dailyQuote, setDailyQuote] = useState(null);
      const [assistantSupervisor, setAssistantSupervisor] = useState(null);
      const [isAdmin, setIsAdmin] = useState(false);
      const [showAdminLogin, setShowAdminLogin] = useState(false);
      const [adminPin, setAdminPin] = useState('');
      
      // Check session for saved admin login
      useEffect(() => {
        const saved = sessionStorage.getItem('pinsAdmin');
        if (saved === 'true') setIsAdmin(true);
      }, []);
      
      const handleAdminLogin = () => {
        if (adminPin === '202') {
          setIsAdmin(true);
          sessionStorage.setItem('pinsAdmin', 'true');
          setShowAdminLogin(false);
          setAdminPin('');
        } else {
          alert('Incorrect PIN');
          setAdminPin('');
        }
      };
      
      const handleAdminLogout = () => {
        setIsAdmin(false);
        sessionStorage.removeItem('pinsAdmin');
      };
      
      useEffect(() => {
        // Initialize riders if they don't exist
        const ridersRef = db.ref('pins/riders');
        ridersRef.once('value', (snapshot) => {
          if (!snapshot.exists()) {
            const initialRiders = {};
            RIDERS.forEach(name => {
              initialRiders[name] = {
                name,
                fines: 0,
                credits: 0,
                pins: {},
                violations: 0,
                awards: 0,
                assistantDays: 0
              };
            });
            ridersRef.set(initialRiders);
          }
        });
        
        // Listen to riders
        ridersRef.on('value', (snapshot) => {
          setRiders(snapshot.val() || {});
        });
        
        // Listen to activities
        const activitiesRef = db.ref('pins/activities');
        activitiesRef.orderByChild('timestamp').limitToLast(50).on('value', (snapshot) => {
          const data = snapshot.val();
          if (data) {
            const activitiesArray = Object.keys(data).map(key => ({
              id: key,
              ...data[key]
            })).sort((a, b) => b.timestamp - a.timestamp);
            setActivities(activitiesArray);
          }
        });
        
        // Listen to kitty
        const kittyRef = db.ref('pins/kitty');
        kittyRef.on('value', (snapshot) => {
          setKittyTotal(snapshot.val() || 0);
        });
        
        // Listen to daily quote
        const quoteRef = db.ref('pins/dailyQuote');
        quoteRef.on('value', (snapshot) => {
          setDailyQuote(snapshot.val() || null);
        });
        
        // Listen to assistant supervisor
        const assistantRef = db.ref('pins/assistantSupervisor');
        assistantRef.on('value', (snapshot) => {
          setAssistantSupervisor(snapshot.val() || null);
        });
        
        return () => {
          ridersRef.off();
          activitiesRef.off();
          kittyRef.off();
          quoteRef.off();
          assistantRef.off();
        };
      }, []);
      
      const leaderboardData = Object.values(riders).sort((a, b) => b.fines - a.fines);
      
      return (
        <div className="app-container">
          <div className="header">
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <div>
                <h1>🏍️ EuroTrash Pins 2026</h1>
                <p>May the odds be ever in your favor</p>
              </div>
              {isAdmin ? (
                <button 
                  onClick={handleAdminLogout}
                  style={{
                    background: '#059669',
                    color: 'white',
                    border: 'none',
                    padding: '8px 16px',
                    borderRadius: '6px',
                    fontSize: '14px'
                  }}
                >
                  🔓 Admin
                </button>
              ) : (
                <button 
                  onClick={() => setShowAdminLogin(true)}
                  style={{
                    background: '#64748b',
                    color: 'white',
                    border: 'none',
                    padding: '8px 16px',
                    borderRadius: '6px',
                    fontSize: '14px'
                  }}
                >
                  🔒 Login
                </button>
              )}
            </div>
          </div>
          
          <div className="tabs">
            <button 
              className={`tab ${activeTab === 'leaderboard' ? 'active' : ''}`}
              onClick={() => setActiveTab('leaderboard')}
            >
              Board
            </button>
            <button 
              className={`tab ${activeTab === 'quote' ? 'active' : ''}`}
              onClick={() => setActiveTab('quote')}
            >
              Quote
            </button>
            <button 
              className={`tab ${activeTab === 'assistant' ? 'active' : ''}`}
              onClick={() => setActiveTab('assistant')}
            >
              Assistant
            </button>
            <button 
              className={`tab ${activeTab === 'report' ? 'active' : ''}`}
              onClick={() => setActiveTab('report')}
            >
              Report
            </button>
            <button 
              className={`tab ${activeTab === 'feed' ? 'active' : ''}`}
              onClick={() => setActiveTab('feed')}
            >
              Feed
            </button>
          </div>
          
          <div className="content">
            {activeTab === 'leaderboard' && (
              <LeaderboardTab 
                riders={leaderboardData} 
                kittyTotal={kittyTotal} 
                assistantSupervisor={assistantSupervisor}
                isAdmin={isAdmin}
              />
            )}
            {activeTab === 'quote' && (
              <QuoteTab dailyQuote={dailyQuote} riders={riders} isAdmin={isAdmin} />
            )}
            {activeTab === 'assistant' && (
              <AssistantTab assistantSupervisor={assistantSupervisor} riders={riders} isAdmin={isAdmin} />
            )}
            {activeTab === 'report' && (
              <ReportTab riders={riders} isAdmin={isAdmin} />
            )}
            {activeTab === 'feed' && (
              <FeedTab activities={activities} isAdmin={isAdmin} />
            )}
          </div>
          
          {showAdminLogin && (
            <div style={{
              position: 'fixed',
              top: 0,
              left: 0,
              right: 0,
              bottom: 0,
              background: 'rgba(0,0,0,0.8)',
              display: 'flex',
              alignItems: 'center',
              justifyContent: 'center',
              zIndex: 1000
            }}>
              <div style={{
                background: '#1e293b',
                padding: '24px',
                borderRadius: '12px',
                maxWidth: '400px',
                width: '90%'
              }}>
                <h2 style={{ marginBottom: '16px', fontSize: '20px' }}>Admin Login</h2>
                <p style={{ marginBottom: '16px', fontSize: '14px', color: '#94a3b8' }}>
                  Enter admin PIN to access protected features
                </p>
                <input
                  type="number"
                  inputMode="numeric"
                  placeholder="Enter PIN"
                  value={adminPin}
                  onChange={(e) => setAdminPin(e.target.value)}
                  onKeyPress={(e) => e.key === 'Enter' && handleAdminLogin()}
                  style={{
                    width: '100%',
                    padding: '12px',
                    fontSize: '18px',
                    background: '#0f172a',
                    border: '1px solid #334155',
                    borderRadius: '6px',
                    color: 'white',
                    textAlign: 'center',
                    letterSpacing: '4px',
                    marginBottom: '16px'
                  }}
                  autoFocus
                />
                <div style={{ display: 'flex', gap: '8px' }}>
                  <button
                    onClick={handleAdminLogin}
                    style={{
                      flex: 1,
                      padding: '12px',
                      background: '#7c3aed',
                      color: 'white',
                      border: 'none',
                      borderRadius: '6px',
                      fontSize: '16px'
                    }}
                  >
                    Login
                  </button>
                  <button
                    onClick={() => {
                      setShowAdminLogin(false);
                      setAdminPin('');
                    }}
                    style={{
                      flex: 1,
                      padding: '12px',
                      background: '#475569',
                      color: 'white',
                      border: 'none',
                      borderRadius: '6px',
                      fontSize: '16px'
                    }}
                  >
                    Cancel
                  </button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }
    
    function LeaderboardTab({ riders, kittyTotal, assistantSupervisor, isAdmin }) {
      return (
        <>
          <div className="kitty-banner">
            <div className="kitty-label">Total Kitty</div>
            <div className="kitty-amount">€{kittyTotal}</div>
            {isAdmin && (() => {
              const totalFines = riders.reduce((sum, r) => sum + (r.fines || 0), 0);
              const totalCredits = riders.reduce((sum, r) => sum + (r.credits || 0), 0);
              const expectedKitty = totalFines - totalCredits;
              const difference = kittyTotal - expectedKitty;
              return difference !== 0 ? (
                <div style={{ fontSize: '11px', marginTop: '4px', color: difference > 0 ? '#fbbf24' : '#ef4444' }}>
                  Expected: €{expectedKitty} (Fines: €{totalFines} - Credits: €{totalCredits})
                  {difference !== 0 && <span> • Diff: €{difference}</span>}
                </div>
              ) : null;
            })()}
          </div>
          
          {riders.length === 0 ? (
            <div className="empty-state">
              <div>No violations yet... suspiciously quiet</div>
            </div>
          ) : (
            riders.map((rider, index) => {
              const isAssistant = assistantSupervisor?.name === rider.name;
              return (
                <div key={rider.name} className={`leaderboard-item ${isAssistant ? 'assistant' : ''}`}>
                  <div className="rank">#{index + 1}</div>
                  <div className="rider-info">
                    <div className="rider-name">
                      {rider.name}
                      {isAssistant && <span className="assistant-badge">💩 Assistant</span>}
                    </div>
                    <div className="rider-stats">
                      <span style={{ 
                        display: 'inline-block',
                        padding: '4px 10px',
                        borderRadius: '4px',
                        fontSize: '12px',
                        fontWeight: 'bold',
                        marginRight: '6px',
                        background: '#10b981',
                        color: 'white'
                      }}>
                        👍 {rider.awards || 0}
                      </span>
                      <span style={{ 
                        display: 'inline-block',
                        padding: '4px 10px',
                        borderRadius: '4px',
                        fontSize: '12px',
                        fontWeight: 'bold',
                        marginRight: '6px',
                        background: '#ef4444',
                        color: 'white'
                      }}>
                        🤠 {rider.country || 0}
                      </span>
                      <span style={{ 
                        display: 'inline-block',
                        padding: '4px 10px',
                        borderRadius: '4px',
                        fontSize: '12px',
                        fontWeight: 'bold',
                        marginRight: '6px',
                        background: '#ef4444',
                        color: 'white'
                      }}>
                        🏍️ {rider.speeder || 0}
                      </span>
                      <span style={{ 
                        display: 'inline-block',
                        padding: '4px 10px',
                        borderRadius: '4px',
                        fontSize: '12px',
                        fontWeight: 'bold',
                        marginRight: '6px',
                        background: '#ef4444',
                        color: 'white'
                      }}>
                        🫪 {rider.dumbfuckery || 0}
                      </span>
                      <span style={{ 
                        display: 'inline-block',
                        padding: '4px 10px',
                        borderRadius: '4px',
                        fontSize: '12px',

          // Normalize function: lowercase, remove punctuation, trim whitespace
          const normalize = (str) => {
            return str
              .toLowerCase()
              .replace(/[''']/g, '')           // Remove all apostrophe types
              .replace(/["""]/g, '')           // Remove all quote types
              .replace(/[.,;:!?—–-]/g, '')     // Remove punctuation and dashes

              .trim();

          const correctNormalized = normalize(dailyQuote.correctQuote);

            // Check for exact match OR if submission is very close (90% match)
            const isCorrect = submissionNormalized === correctNormalized ||

            // Update submission with result

    function AssistantTab({ assistantSupervisor, riders, isAdmin }) {
      const [completedDuties, setCompletedDuties] = useState({});
      const [manualSelection, setManualSelection] = useState('');
      
      useEffect(() => {
        if (assistantSupervisor) {
          const dutiesRef = db.ref(`pins/assistantSupervisor/completedDuties`);
          dutiesRef.on('value', (snapshot) => {
            setCompletedDuties(snapshot.val() || {});
          });
          return () => dutiesRef.off();
        }
      }, [assistantSupervisor]);
      
      const handleToggleDuty = async (dutyId) => {
        if (!assistantSupervisor) return;
        
        const newState = !completedDuties[dutyId];
        await db.ref(`pins/assistantSupervisor/completedDuties/${dutyId}`).set(newState);
      };
      
      const handleValidateCompletion = async () => {
        if (!assistantSupervisor) return;
        
        // Check if all duties are completed
        const allCompleted = ASSISTANT_DUTIES.every(duty => completedDuties[duty.id]);
        
        if (!allCompleted) {
          alert('Not all duties completed yet!');
          return;
        }
        
        if (!confirm(`Award €5 bonus to ${assistantSupervisor.name} for completing all duties?`)) {
          return;
        }
        
        try {
          // Get rider data
          const riderRef = db.ref(`pins/riders/${assistantSupervisor.name}`);
          const riderSnapshot = await riderRef.once('value');
          const riderData = riderSnapshot.val();
          
          // Add €5 credit (like Borat)
          await riderRef.update({
            credits: (riderData.credits || 0) + 5,
            awards: (riderData.awards || 0) + 1
          });
          
          // Deduct from kitty
          const kittyRef = db.ref('pins/kitty');
          const kittySnapshot = await kittyRef.once('value');
          await kittyRef.set(Math.max(0, (kittySnapshot.val() || 0) - 5));
          
          // Add activity feed
          const activityRef = db.ref('pins/activities').push();
          await activityRef.set({
            type: 'award',
            rider: assistantSupervisor.name,
            pin: 'assistant-bonus',
            fine: 5,
            description: 'Completed all Assistant Supervisor duties!',
            timestamp: Date.now()
          });
          
          alert(`€5 bonus awarded to ${assistantSupervisor.name}! 🎉`);
        } catch (error) {
          console.error('Error awarding bonus:', error);
          alert('Error awarding bonus');
        }
      };
      
      const handleSetAssistant = async (selectedName = null) => {
        // Check if there's a current assistant with uncompleted duties
        if (assistantSupervisor) {
          const uncompletedDuties = ASSISTANT_DUTIES.filter(duty => !completedDuties[duty.id]);
          
          if (uncompletedDuties.length > 0) {
            const confirmMsg = `${assistantSupervisor.name} has ${uncompletedDuties.length} uncompleted duties.\n\nApply €${uncompletedDuties.length * 5} in fines before setting new assistant?`;
            
            if (!confirm(confirmMsg)) {
              return; // User cancelled
            }
            
            // Apply fines for all missed duties
            const totalFines = uncompletedDuties.length * 5;
            const name = assistantSupervisor.name;
            
            try {
              // Add fines to rider
              const riderRef = db.ref(`pins/riders/${name}`);
              const riderSnapshot = await riderRef.once('value');
              const riderData = riderSnapshot.val();
              
              await riderRef.update({
                fines: (riderData.fines || 0) + totalFines
              });
              
              // Update kitty
              const kittyRef = db.ref('pins/kitty');
              const kittySnapshot = await kittyRef.once('value');
              await kittyRef.set((kittySnapshot.val() || 0) + totalFines);
              
              // Add activity for each missed duty
              for (const duty of uncompletedDuties) {
                const activityRef = db.ref('pins/activities').push();
                await activityRef.set({
                  type: 'violation',
                  rider: name,
                  pin: 'assistant-duty',
                  fine: 5,
                  description: `Missed Assistant Supervisor duty: ${duty.text}`,
                  timestamp: Date.now()
                });
              }
            } catch (error) {
              console.error('Error applying fines:', error);
              alert('Error applying fines for missed duties');
              return;
            }
          }
        }
        
        // Now set the new assistant
        const ridersList = Object.values(riders);
        if (ridersList.length === 0) return;
        
        let newAssistant;
        
        if (selectedName) {
          // Manual selection
          newAssistant = ridersList.find(r => r.name === selectedName);
        } else {
          // Auto: Find rider with most fines
          const sortedByFines = [...ridersList].sort((a, b) => b.fines - a.fines);
          newAssistant = sortedByFines[0];
        }
        
        if (!newAssistant) return;
        
        // Update assistant supervisor
        await db.ref('pins/assistantSupervisor').set({
          name: newAssistant.name,
          date: new Date().toISOString().split('T')[0],
          completedDuties: {}
        });
        
        // Increment their assistant days counter
        await db.ref(`pins/riders/${newAssistant.name}/assistantDays`).set(
          (newAssistant.assistantDays || 0) + 1
        );
        
        setManualSelection('');
        alert(`${newAssistant.name} is now Assistant Supervisor!`);
      };
      
      const handleMissedDuty = async (duty) => {
        if (!assistantSupervisor) return;
        
        const name = assistantSupervisor.name;
        const fine = duty.penalty;
        
        try {
          // Add fine
          const riderRef = db.ref(`pins/riders/${name}`);
          const riderSnapshot = await riderRef.once('value');
          const riderData = riderSnapshot.val();
          
          await riderRef.update({
            fines: (riderData.fines || 0) + fine
          });
          
          // Update kitty
          const kittyRef = db.ref('pins/kitty');
          const kittySnapshot = await kittyRef.once('value');
          await kittyRef.set((kittySnapshot.val() || 0) + fine);
          
          // Add activity
          const activityRef = db.ref('pins/activities').push();
          await activityRef.set({
            type: 'violation',
            rider: name,
            pin: 'assistant-duty',
            fine: fine,
            description: `Missed Assistant Supervisor duty: ${duty.text}`,
            timestamp: Date.now()
          });
          
          alert(`€${fine} fine added for missed duty`);
        } catch (error) {
          console.error('Error:', error);
          alert('Error adding fine');
        }
      };
      
      if (!assistantSupervisor) {
        return (
          <div className="card">
            <h2 style={{ marginBottom: '16px' }}>Daily Assistant Supervisor</h2>
            <p style={{ marginBottom: '16px', color: '#94a3b8' }}>
              No assistant supervisor assigned yet.
            </p>
            
            {!isAdmin ? (
              <div style={{ background: '#475569', padding: '16px', borderRadius: '8px', textAlign: 'center' }}>
                <p style={{ margin: 0, color: '#cbd5e1' }}>🔒 Admin login required to assign Assistant</p>
              </div>
            ) : (
              <>
                <div style={{ marginBottom: '16px' }}>
                  <button className="btn btn-primary" onClick={() => handleSetAssistant()}>
                    Auto: Set Assistant (Most Fined)
                  </button>
                </div>
                
                <div style={{ borderTop: '1px solid #334155', paddingTop: '16px', marginTop: '16px' }}>
                  <label className="form-label">Or manually select:</label>
                  <select 
                    className="form-select"
                    value={manualSelection}
                    onChange={(e) => setManualSelection(e.target.value)}

        const diffMs = now - date;
        const diffMins = Math.floor(diffMs / 60000);
        const diffHours = Math.floor(diffMs / 3600000);
        const diffDays = Math.floor(diffMs / 86400000);
        
        if (diffMins < 1) return 'Just now';
        if (diffMins < 60) return `${diffMins}m ago`;
        if (diffHours < 24) return `${diffHours}h ago`;
        if (diffDays === 1) return 'Yesterday';
        if (diffDays < 7) return `${diffDays}d ago`;
        
        // Show actual date for older entries
        const day = date.getDate();
        const month = date.toLocaleDateString('en-GB', { month: 'short' });
        const time = date.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
        return `${day} ${month} ${time}`;
      };
      
      const allPins = [...PIN_CATEGORIES.positive, ...PIN_CATEGORIES.negative];
      
      if (activities.length === 0) {
        return (
          <div className="empty-state">
            <div>No activity yet</div>
          </div>
        );
      }
      
      return (
        <>
          {activities.map(activity => {
            const pin = allPins.find(p => p.id === activity.pin);
            const isAward = activity.type === 'award';
            
            let pinName = pin ? `${pin.icon} ${pin.name}` : activity.pin;
            if (activity.pin === 'quote-challenge') pinName = '📝 Quote Challenge';
            if (activity.pin === 'assistant-duty') pinName = '💩 Assistant Duty';
            
            return (
              <div key={activity.id} className={`activity-item ${activity.type}`}>
                <div className="activity-header">
                  <div className="activity-type">
                    {isAward ? '🏆' : '⚠️'} {activity.rider}
                  </div>
                  <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                    <div className="activity-time">{formatTime(activity.timestamp)}</div>
                    {isAdmin && (
                      <button
                        onClick={async () => {
                          if (!confirm(`Undo this ${isAward ? 'award' : 'violation'}? This will reverse the fine/credit.`)) {
                            return;
                          }
                          
                          try {
                            // Reverse the rider's fine/credit
                            const riderRef = db.ref(`pins/riders/${activity.rider}`);
                            const riderSnapshot = await riderRef.once('value');
                            const riderData = riderSnapshot.val();
                            
                            if (isAward) {
                              // Remove credit and award count
                              await riderRef.update({
                                credits: Math.max(0, (riderData.credits || 0) - (activity.fine || 5)),
                                awards: Math.max(0, (riderData.awards || 0) - 1)
                              });
                              
                              // Add credit back to kitty
                              const kittyRef = db.ref('pins/kitty');
                              const kittySnapshot = await kittyRef.once('value');
                              await kittyRef.set((kittySnapshot.val() || 0) + (activity.fine || 5));
                            } else {
                              // Remove fine and violation count
                              await riderRef.update({
                                fines: Math.max(0, (riderData.fines || 0) - (activity.fine || 0)),
                                violations: Math.max(0, (riderData.violations || 0) - 1)
                              });
                              
                              // Remove fine from kitty
                              const kittyRef = db.ref('pins/kitty');
                              const kittySnapshot = await kittyRef.once('value');
                              await kittyRef.set(Math.max(0, (kittySnapshot.val() || 0) - (activity.fine || 0)));
                            }
                            
                            // Delete the feed entry
                            await db.ref(`pins/activities/${activity.id}`).remove();
                          } catch (error) {
                            alert('Error undoing entry: ' + error.message);
                          }
                        }}
                        style={{
                          background: '#dc2626',
                          color: 'white',
                          border: 'none',
                          padding: '4px 8px',
                          borderRadius: '4px',
                          fontSize: '12px',
                          cursor: 'pointer'
                        }}
                      >
                        ↩️
                      </button>
                    )}
                  </div>
                </div>
                <div className="activity-description">
                  <strong>{pinName}</strong>
                  {activity.fine > 0 && ` • €${activity.fine}`}
                  {activity.description && (
                    <div style={{ marginTop: '6px', color: '#cbd5e1' }}>
                      {activity.description}
                    </div>
                  )}
                  {activity.reportedBy && (
                    <div style={{ marginTop: '6px', fontSize: '12px', color: '#64748b' }}>
                      Reported by {activity.reportedBy}
                    </div>
                  )}
                </div>
                {activity.photoURL && (
                  <img src={activity.photoURL} alt="Evidence" className="activity-photo" />
                )}
              </div>
            );
          })}
        </>
      );
    }
    
    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
