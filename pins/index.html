<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>EuroTrash Pins 2026</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/png" href="icon-192.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      padding-bottom: 80px;
    }
    
    .app-container {
      max-width: 600px;
      margin: 0 auto;
    }
    
    .header {
      background: linear-gradient(135deg, #7c3aed 0%, #ec4899 100%);
      padding: 20px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 4px 6px rgba(0,0,0,0.3);
    }
    
    .header h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 4px;
    }
    
    .header p {
      font-size: 13px;
      opacity: 0.9;
    }
    
    .tabs {
      display: flex;
      background: #1e293b;
      border-bottom: 2px solid #334155;
      position: sticky;
      top: 72px;
      z-index: 99;
      overflow-x: auto;
    }
    
    .tab {
      flex: 1;
      padding: 14px 8px;
      text-align: center;
      background: none;
      border: none;
      color: #94a3b8;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      position: relative;
      white-space: nowrap;
      min-width: 80px;
    }
    
    .tab.active {
      color: #ec4899;
    }
    
    .tab.active::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 0;
      right: 0;
      height: 2px;
      background: #ec4899;
    }
    
    .content {
      padding: 16px;
    }
    
    .card {
      background: #1e293b;
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 12px;
      border: 1px solid #334155;
    }
    
    .leaderboard-item {
      display: flex;
      align-items: center;
      padding: 12px;
      background: #1e293b;
      border-radius: 8px;
      margin-bottom: 8px;
      border: 1px solid #334155;
    }
    
    .leaderboard-item.assistant {
      border: 2px solid #f59e0b;
      background: #1e1b16;
    }
    
    .rank {
      font-size: 20px;
      font-weight: 700;
      width: 40px;
      text-align: center;
      color: #7c3aed;
    }
    
    .rider-info {
      flex: 1;
      margin-left: 12px;
    }
    
    .rider-name {
      font-weight: 600;
      font-size: 16px;
      margin-bottom: 4px;
    }
    
    .assistant-badge {
      display: inline-block;
      background: #f59e0b;
      color: #000;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      margin-left: 6px;
      text-transform: uppercase;
    }
    
    .rider-stats {
      font-size: 13px;
      color: #94a3b8;
    }
    
    .fines-total {
      font-size: 18px;
      font-weight: 700;
      color: #ef4444;
      text-align: right;
    }
    
    .pin-badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 6px;
      font-size: 11px;
      font-weight: 600;
      margin: 2px;
      background: #334155;
    }
    
    .pin-badge.positive {
      background: #059669;
      color: white;
    }
    
    .pin-badge.negative {
      background: #dc2626;
      color: white;
    }
    
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 12px;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #7c3aed 0%, #ec4899 100%);
      color: white;
    }
    
    .btn-primary:active {
      transform: scale(0.98);
    }
    
    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .btn-secondary {
      background: #334155;
      color: #e2e8f0;
    }
    
    .btn-success {
      background: #059669;
      color: white;
    }
    
    .btn-danger {
      background: #dc2626;
      color: white;
    }
    
    .form-group {
      margin-bottom: 16px;
    }
    
    .form-label {
      display: block;
      margin-bottom: 6px;
      font-weight: 600;
      font-size: 14px;
      color: #cbd5e1;
    }
    
    .form-select,
    .form-input,
    .form-textarea {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #334155;
      background: #0f172a;
      color: #e2e8f0;
      font-size: 15px;
    }
    
    .form-textarea {
      resize: vertical;
      min-height: 80px;
    }
    
    .file-upload {
      display: block;
      width: 100%;
      padding: 40px;
      border: 2px dashed #334155;
      border-radius: 8px;
      text-align: center;
      cursor: pointer;
      background: #0f172a;
      transition: all 0.2s;
    }
    
    .file-upload:hover {
      border-color: #7c3aed;
      background: #1e293b;
    }
    
    .file-upload input {
      display: none;
    }
    
    .preview-image {
      max-width: 100%;
      border-radius: 8px;
      margin-top: 12px;
    }
    
    .activity-item {
      background: #1e293b;
      border-radius: 8px;
      padding: 14px;
      margin-bottom: 10px;
      border-left: 4px solid #7c3aed;
    }
    
    .activity-item.violation {
      border-left-color: #ef4444;
    }
    
    .activity-item.award {
      border-left-color: #10b981;
    }
    
    .activity-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }
    
    .activity-type {
      font-weight: 700;
      font-size: 14px;
    }
    
    .activity-time {
      font-size: 12px;
      color: #64748b;
    }
    
    .activity-description {
      font-size: 14px;
      line-height: 1.5;
      margin-bottom: 8px;
    }
    
    .activity-photo {
      width: 100%;
      border-radius: 6px;
      margin-top: 8px;
    }
    
    .kitty-banner {
      background: linear-gradient(135deg, #059669 0%, #10b981 100%);
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      margin-bottom: 20px;
    }
    
    .kitty-label {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 1px;
      opacity: 0.9;
      margin-bottom: 4px;
    }
    
    .kitty-amount {
      font-size: 36px;
      font-weight: 700;
    }
    
    .quote-challenge-box {
      background: linear-gradient(135deg, #7c3aed 0%, #ec4899 100%);
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 20px;
    }
    
    .quote-status {
      text-align: center;
      font-size: 14px;
      margin-bottom: 12px;
      opacity: 0.9;
    }
    
    .quote-input {
      background: white;
      color: #000;
      padding: 16px;
      border-radius: 8px;
      font-size: 16px;
      text-align: center;
      border: none;
      width: 100%;
      margin-bottom: 12px;
    }
    
    .quote-submitted {
      background: rgba(255,255,255,0.2);
      padding: 16px;
      border-radius: 8px;
      text-align: center;
      margin-bottom: 12px;
    }
    
    .quote-result {
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      font-weight: 600;
      margin-top: 12px;
    }
    
    .quote-result.correct {
      background: #059669;
    }
    
    .quote-result.incorrect {
      background: #dc2626;
    }
    
    .duty-checklist {
      background: #1e293b;
      padding: 16px;
      border-radius: 8px;
      margin-bottom: 16px;
    }
    
    .duty-item {
      display: flex;
      align-items: center;
      padding: 12px;
      margin-bottom: 8px;
      background: #0f172a;
      border-radius: 6px;
    }
    
    .duty-checkbox {
      width: 24px;
      height: 24px;
      margin-right: 12px;
      cursor: pointer;
    }
    
    .duty-text {
      flex: 1;
      font-size: 14px;
    }
    
    .duty-item.checked {
      opacity: 0.5;
    }
    
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #64748b;
    }
    
    @media (max-width: 480px) {
      .header h1 {
        font-size: 20px;
      }
      
      .tab {
        font-size: 11px;
        padding: 12px 4px;
        min-width: 70px;
      }
    }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-database-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>
  
  <script type="text/babel">
    const { useState, useEffect } = React;
    
    // Firebase configuration
    const firebaseConfig = {
      apiKey: "AIzaSyBOXKNZupe6KYLqHS4DqGJnKGG0u4OI_N4",
      authDomain: "eurotrash-2026.firebaseapp.com",
      databaseURL: "https://eurotrash-2026-default-rtdb.firebaseio.com",
      projectId: "eurotrash-2026",
      storageBucket: "eurotrash-2026.appspot.com",
      messagingSenderId: "123456789",
      appId: "1:123456789:web:abcdef123456"
    };
    
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const storage = firebase.storage();
    
    const RIDERS = ['Terry', 'Steve', 'Derek', 'Mark', 'Ant', 'Charles'];
    
    const RIDER_PINS = {
      'Terry': '202',
      'Steve': '347',
      'Derek': '825',
      'Mark': '691',
      'Ant': '514',
      'Charles': '738'
    };
    
    const PIN_CATEGORIES = {
      positive: [
        { id: 'borat', name: 'Borat - Very Nice', icon: '👍' }
      ],
      negative: [
        { id: 'country-member', name: 'Country Member', icon: '🤠' },
        { id: 'speeder', name: 'Speeder', icon: '🏍️' },
        { id: 'dumbfuckery', name: 'Dumbfuckery', icon: '🤦' }
      ]
    };
    
    const ASSISTANT_DUTIES = [
      { id: 'roll-call', text: 'Morning Roll Call - Check all badges', penalty: 5 },
      { id: 'tally', text: 'Keep running tally of fines during day', penalty: 5 },
      { id: 'photos', text: 'Ensure violation photos posted to WhatsApp', penalty: 5 },
      { id: 'summary', text: 'Read daily summary at dinner', penalty: 5 },
      { id: 'rituals', text: 'Lead humiliation rituals', penalty: 5 }
    ];
    
    const DEFAULT_QUOTES = [
      "I gotta see the candy first. Then I get in the van. I'm not stupid.",
      "Knowing better has never stopped me",
      "The beatings will continue until morale improves",
      "Stop screaming... I'm scared too",
      "Bad decisions make good stories",
      "Don't grow up - it's a trap",
      "That's a terrible idea. When do we start?",
      "In my defense I was left unsupervised",
      "Well if it isn't the consequences of my own actions",
      "I shaved my balls for this?",
      "It could always be worse",
      "If at first you don't succeed, try doing it the way I told you to"
    ];
    
    function App() {
      const [activeTab, setActiveTab] = useState('leaderboard');
      const [riders, setRiders] = useState({});
      const [activities, setActivities] = useState([]);
      const [kittyTotal, setKittyTotal] = useState(0);
      const [dailyQuote, setDailyQuote] = useState(null);
      const [assistantSupervisor, setAssistantSupervisor] = useState(null);
      
      useEffect(() => {
        // Initialize riders if they don't exist
        const ridersRef = db.ref('pins/riders');
        ridersRef.once('value', (snapshot) => {
          if (!snapshot.exists()) {
            const initialRiders = {};
            RIDERS.forEach(name => {
              initialRiders[name] = {
                name,
                fines: 0,
                pins: {},
                violations: 0,
                awards: 0,
                assistantDays: 0
              };
            });
            ridersRef.set(initialRiders);
          }
        });
        
        // Listen to riders
        ridersRef.on('value', (snapshot) => {
          setRiders(snapshot.val() || {});
        });
        
        // Listen to activities
        const activitiesRef = db.ref('pins/activities');
        activitiesRef.orderByChild('timestamp').limitToLast(50).on('value', (snapshot) => {
          const data = snapshot.val();
          if (data) {
            const activitiesArray = Object.keys(data).map(key => ({
              id: key,
              ...data[key]
            })).sort((a, b) => b.timestamp - a.timestamp);
            setActivities(activitiesArray);
          }
        });
        
        // Listen to kitty
        const kittyRef = db.ref('pins/kitty');
        kittyRef.on('value', (snapshot) => {
          setKittyTotal(snapshot.val() || 0);
        });
        
        // Listen to daily quote
        const quoteRef = db.ref('pins/dailyQuote');
        quoteRef.on('value', (snapshot) => {
          setDailyQuote(snapshot.val() || null);
        });
        
        // Listen to assistant supervisor
        const assistantRef = db.ref('pins/assistantSupervisor');
        assistantRef.on('value', (snapshot) => {
          setAssistantSupervisor(snapshot.val() || null);
        });
        
        return () => {
          ridersRef.off();
          activitiesRef.off();
          kittyRef.off();
          quoteRef.off();
          assistantRef.off();
        };
      }, []);
      
      const leaderboardData = Object.values(riders).sort((a, b) => b.fines - a.fines);
      
      return (
        <div className="app-container">
          <div className="header">
            <h1>🏍️ EuroTrash Pins 2026</h1>
            <p>May the odds be ever in your favor</p>
          </div>
          
          <div className="tabs">
            <button 
              className={`tab ${activeTab === 'leaderboard' ? 'active' : ''}`}
              onClick={() => setActiveTab('leaderboard')}
            >
              Board
            </button>
            <button 
              className={`tab ${activeTab === 'quote' ? 'active' : ''}`}
              onClick={() => setActiveTab('quote')}
            >
              Quote
            </button>
            <button 
              className={`tab ${activeTab === 'assistant' ? 'active' : ''}`}
              onClick={() => setActiveTab('assistant')}
            >
              Assistant
            </button>
            <button 
              className={`tab ${activeTab === 'report' ? 'active' : ''}`}
              onClick={() => setActiveTab('report')}
            >
              Report
            </button>
            <button 
              className={`tab ${activeTab === 'feed' ? 'active' : ''}`}
              onClick={() => setActiveTab('feed')}
            >
              Feed
            </button>
          </div>
          
          <div className="content">
            {activeTab === 'leaderboard' && (
              <LeaderboardTab 
                riders={leaderboardData} 
                kittyTotal={kittyTotal} 
                assistantSupervisor={assistantSupervisor}
              />
            )}
            {activeTab === 'quote' && (
              <QuoteTab dailyQuote={dailyQuote} riders={riders} />
            )}
            {activeTab === 'assistant' && (
              <AssistantTab assistantSupervisor={assistantSupervisor} riders={riders} />
            )}
            {activeTab === 'report' && (
              <ReportTab riders={riders} />
            )}
            {activeTab === 'feed' && (
              <FeedTab activities={activities} />
            )}
          </div>
        </div>
      );
    }
    
    function LeaderboardTab({ riders, kittyTotal, assistantSupervisor }) {
      return (
        <>
          <div className="kitty-banner">
            <div className="kitty-label">Total Kitty</div>
            <div className="kitty-amount">€{kittyTotal}</div>
          </div>
          
          {riders.length === 0 ? (
            <div className="empty-state">
              <div>No violations yet... suspiciously quiet</div>
            </div>
          ) : (
            riders.map((rider, index) => {
              const isAssistant = assistantSupervisor?.name === rider.name;
              return (
                <div key={rider.name} className={`leaderboard-item ${isAssistant ? 'assistant' : ''}`}>
                  <div className="rank">#{index + 1}</div>
                  <div className="rider-info">
                    <div className="rider-name">
                      {rider.name}
                      {isAssistant && <span className="assistant-badge">💩 Assistant</span>}
                    </div>
                    <div className="rider-stats">
                      {rider.violations || 0} violations • {rider.awards || 0} awards
                      {rider.assistantDays > 0 && ` • ${rider.assistantDays} days as assistant`}
                    </div>
                    <div style={{ marginTop: '6px' }}>
                      {rider.pins && Object.entries(rider.pins).map(([pinId, count]) => {
                        if (count > 0) {
                          const allPins = [...PIN_CATEGORIES.positive, ...PIN_CATEGORIES.negative];
                          const pin = allPins.find(p => p.id === pinId);
                          const isPositive = PIN_CATEGORIES.positive.some(p => p.id === pinId);
                          return (
                            <span 
                              key={pinId}
                              className={`pin-badge ${isPositive ? 'positive' : 'negative'}`}
                            >
                              {pin?.icon} {count}
                            </span>
                          );
                        }
                        return null;
                      })}
                    </div>
                  </div>
                  <div className="fines-total">
                    <div style={{ fontSize: '20px', fontWeight: '700' }}>
                      €{(rider.fines || 0) - (rider.credits || 0)}
                    </div>
                    {rider.credits > 0 && (
                      <div style={{ fontSize: '11px', color: '#059669', marginTop: '2px' }}>
                        {rider.fines || 0} fines - {rider.credits} credits
                      </div>
                    )}
                  </div>
                </div>
              );
            })
          )}
        </>
      );
    }
    
    function QuoteTab({ dailyQuote, riders }) {
      const [myName, setMyName] = useState('');
      const [myPin, setMyPin] = useState('');
      const [quoteInput, setQuoteInput] = useState('');
      const [submitting, setSubmitting] = useState(false);
      const [isAdmin, setIsAdmin] = useState(false);
      const [selectedQuote, setSelectedQuote] = useState('');
      const [customQuote, setCustomQuote] = useState('');
      const [showAddQuote, setShowAddQuote] = useState(false);
      const [quoteList, setQuoteList] = useState([]);
      const [quoteUsage, setQuoteUsage] = useState({});
      
      const today = new Date().toISOString().split('T')[0];
      const isToday = dailyQuote?.date === today;
      const mySubmission = dailyQuote?.submissions?.[myName];
      const hasSubmitted = !!mySubmission;
      
      useEffect(() => {
        // Load quote list
        const quotesRef = db.ref('pins/quoteList');
        quotesRef.once('value', (snapshot) => {
          if (!snapshot.exists()) {
            // Initialize with defaults
            quotesRef.set(DEFAULT_QUOTES);
            setQuoteList(DEFAULT_QUOTES);
          } else {
            setQuoteList(snapshot.val());
          }
        });
        
        quotesRef.on('value', (snapshot) => {
          setQuoteList(snapshot.val() || []);
        });
        
        // Load usage stats
        const usageRef = db.ref('pins/quoteUsage');
        usageRef.on('value', (snapshot) => {
          setQuoteUsage(snapshot.val() || {});
        });
        
        return () => {
          quotesRef.off();
          usageRef.off();
        };
      }, []);
      
      const handleSubmitQuote = async () => {
        if (!myName || !quoteInput.trim()) {
          alert('Please enter your name and the quote');
          return;
        }
        
        // Verify PIN
        if (myPin !== RIDER_PINS[myName]) {
          alert('Incorrect PIN. Try again.');
          setMyPin('');
          return;
        }
        
        setSubmitting(true);
        
        try {
          const submissionRef = db.ref(`pins/dailyQuote/submissions/${myName}`);
          await submissionRef.set({
            quote: quoteInput.trim(),
            timestamp: Date.now()
          });
          
          alert('Quote submitted! You cannot change it now.');
          setQuoteInput('');
          setMyName('');
          setMyPin('');
        } catch (error) {
          console.error('Error submitting:', error);
          alert('Error submitting quote');
        } finally {
          setSubmitting(false);
        }
      };
      
      const handleSetDailyQuote = async () => {
        const quoteToSet = selectedQuote === 'custom' ? customQuote.trim() : selectedQuote;
        
        if (!quoteToSet) {
          alert('Please select or enter a quote');
          return;
        }
        
        try {
          const quoteRef = db.ref('pins/dailyQuote');
          await quoteRef.set({
            date: today,
            correctQuote: quoteToSet,
            timestamp: Date.now(),
            submissions: {}
          });
          
          // Update usage count
          const usageRef = db.ref(`pins/quoteUsage/${btoa(quoteToSet)}`);
          const usageSnapshot = await usageRef.once('value');
          await usageRef.set({
            quote: quoteToSet,
            count: (usageSnapshot.val()?.count || 0) + 1,
            lastUsed: today
          });
          
          alert('Daily quote set!');
          setSelectedQuote('');
          setCustomQuote('');
          setIsAdmin(false);
        } catch (error) {
          console.error('Error setting quote:', error);
          alert('Error setting quote');
        }
      };
      
      const handleAddQuote = async () => {
        if (!customQuote.trim()) {
          alert('Please enter a quote');
          return;
        }
        
        try {
          const newList = [...quoteList, customQuote.trim()];
          await db.ref('pins/quoteList').set(newList);
          
          alert('Quote added to list!');
          setCustomQuote('');
          setShowAddQuote(false);
        } catch (error) {
          console.error('Error adding quote:', error);
          alert('Error adding quote');
        }
      };
      
      const handleScoreQuotes = async () => {
        if (!dailyQuote || !dailyQuote.correctQuote) return;
        
        try {
          const submissions = dailyQuote.submissions || {};
          let finesAdded = 0;
          
          for (const [name, submission] of Object.entries(submissions)) {
            const isCorrect = submission.quote === dailyQuote.correctQuote;
            
            // Update submission with result
            await db.ref(`pins/dailyQuote/submissions/${name}/correct`).set(isCorrect);
            
            if (!isCorrect) {
              // Add fine
              const riderRef = db.ref(`pins/riders/${name}`);
              const riderSnapshot = await riderRef.once('value');
              const riderData = riderSnapshot.val();
              
              await riderRef.update({

    function AssistantTab({ assistantSupervisor, riders }) {
      const [completedDuties, setCompletedDuties] = useState({});
      const [manualSelection, setManualSelection] = useState('');
      
      useEffect(() => {
        if (assistantSupervisor) {
          const dutiesRef = db.ref(`pins/assistantSupervisor/completedDuties`);
          dutiesRef.on('value', (snapshot) => {
            setCompletedDuties(snapshot.val() || {});
          });
          return () => dutiesRef.off();
        }
      }, [assistantSupervisor]);
      
      const handleToggleDuty = async (dutyId) => {
        if (!assistantSupervisor) return;
        
        const newState = !completedDuties[dutyId];
        await db.ref(`pins/assistantSupervisor/completedDuties/${dutyId}`).set(newState);
      };
      
      const handleSetAssistant = async (selectedName = null) => {
        const ridersList = Object.values(riders);
        if (ridersList.length === 0) return;
        
        let newAssistant;
        
        if (selectedName) {
          // Manual selection
          newAssistant = ridersList.find(r => r.name === selectedName);
        } else {
          // Auto: Find rider with most fines
          const sortedByFines = [...ridersList].sort((a, b) => b.fines - a.fines);
          newAssistant = sortedByFines[0];
        }
        
        if (!newAssistant) return;
        
        // Update assistant supervisor
        await db.ref('pins/assistantSupervisor').set({
          name: newAssistant.name,
          date: new Date().toISOString().split('T')[0],
          completedDuties: {}
        });
        
        // Increment their assistant days counter
        await db.ref(`pins/riders/${newAssistant.name}/assistantDays`).set(
          (newAssistant.assistantDays || 0) + 1
        );
        
        setManualSelection('');
        alert(`${newAssistant.name} is now Assistant Supervisor!`);
      };
      
      const handleMissedDuty = async (duty) => {
        if (!assistantSupervisor) return;
        
        const name = assistantSupervisor.name;
        const fine = duty.penalty;
        
        try {
          // Add fine
          const riderRef = db.ref(`pins/riders/${name}`);
          const riderSnapshot = await riderRef.once('value');
          const riderData = riderSnapshot.val();
          
          await riderRef.update({
            fines: (riderData.fines || 0) + fine
          });
          
          // Update kitty
          const kittyRef = db.ref('pins/kitty');
          const kittySnapshot = await kittyRef.once('value');
          await kittyRef.set((kittySnapshot.val() || 0) + fine);
          
          // Add activity
          const activityRef = db.ref('pins/activities').push();
          await activityRef.set({
            type: 'violation',
            rider: name,
            pin: 'assistant-duty',
            fine: fine,
            description: `Missed Assistant Supervisor duty: ${duty.text}`,
            timestamp: Date.now()
          });
          
          alert(`€${fine} fine added for missed duty`);
        } catch (error) {
          console.error('Error:', error);
          alert('Error adding fine');
        }
      };
      
      if (!assistantSupervisor) {
        return (
          <div className="card">
            <h2 style={{ marginBottom: '16px' }}>Daily Assistant Supervisor</h2>
            <p style={{ marginBottom: '16px', color: '#94a3b8' }}>
              No assistant supervisor assigned yet.
            </p>
            
            <div style={{ marginBottom: '16px' }}>
              <button className="btn btn-primary" onClick={() => handleSetAssistant()}>
                Auto: Set Assistant (Most Fined)
              </button>
            </div>
            
            <div style={{ borderTop: '1px solid #334155', paddingTop: '16px', marginTop: '16px' }}>
              <label className="form-label">Or manually select:</label>
              <select 
                className="form-select"
                value={manualSelection}
                onChange={(e) => setManualSelection(e.target.value)}
                style={{ marginBottom: '12px' }}
              >
                <option value="">-- Select rider --</option>
                {RIDERS.map(name => (
                  <option key={name} value={name}>{name}</option>
                ))}
              </select>
              <button 
                className="btn btn-secondary" 
                onClick={() => handleSetAssistant(manualSelection)}
                disabled={!manualSelection}
              >
                Set Selected as Assistant
              </button>
            </div>
          </div>
        );
      }
      
      return (
        <>
          <div className="card" style={{ background: 'linear-gradient(135deg, #f59e0b 0%, #d97706 100%)', color: '#000' }}>
            <h2 style={{ marginBottom: '8px' }}>💩 Shit Show Assistant Supervisor</h2>
            <div style={{ fontSize: '24px', fontWeight: '700', marginBottom: '4px' }}>
              {assistantSupervisor.name}
            </div>
            <div style={{ fontSize: '14px', opacity: 0.8 }}>
              {new Date(assistantSupervisor.date).toLocaleDateString()}
            </div>
          </div>
          
          <div className="duty-checklist">
            <h3 style={{ marginBottom: '12px' }}>Daily Duties (€5 fine each if missed)</h3>
            {ASSISTANT_DUTIES.map(duty => (
              <div key={duty.id} className={`duty-item ${completedDuties[duty.id] ? 'checked' : ''}`}>
                <input 
                  type="checkbox"
                  className="duty-checkbox"
                  checked={completedDuties[duty.id] || false}
                  onChange={() => handleToggleDuty(duty.id)}
                />
                <div className="duty-text">{duty.text}</div>
                <button 
                  className="btn btn-danger"
                  style={{ 
                    padding: '6px 12px', 
                    fontSize: '12px',
                    width: 'auto',
                    marginLeft: '8px',
                    marginBottom: 0
                  }}
                  onClick={() => handleMissedDuty(duty)}
                >
                  Missed
                </button>
              </div>

          </div>
          
          <div className="card">
            <h3 style={{ marginBottom: '12px' }}>Perks (Following Day)</h3>
            <div style={{ fontSize: '14px', color: '#94a3b8', lineHeight: '1.6' }}>
              ✅ Choice of roommate for next evening<br/>
              ✅ Group buys you lunch tomorrow<br/>
              ✅ First pint at next evening stop<br/>
              ✅ One navigation veto tomorrow<br/>

              * Perks earned after duties validated at dinner

            className="btn btn-secondary"
            onClick={handleSetAssistant}

            Reset Assistant for New Day

      const [dailyBorat, setDailyBorat] = useState(null);
      const [boratSelection, setBoratSelection] = useState('');

          setDailyBorat(snapshot.val());

          setPhoto(file);
          const reader = new FileReader();
          reader.onloadend = () => {
            setPhotoPreview(reader.result);
          };
          reader.readAsDataURL(file);
        }

        if (!boratSelection) {
          alert('Please select a rider');
          return;
        }
        
        try {
          const today = new Date().toISOString().split('T')[0];
          
          // Check if already assigned today
          if (dailyBorat && dailyBorat.date === today) {
            if (!confirm(`${dailyBorat.name} already has Borat today. Reassign to ${boratSelection}?`)) {
              return;
            }
            
            // Remove credit from previous winner
            const prevRiderRef = db.ref(`pins/riders/${dailyBorat.name}`);
            const prevSnapshot = await prevRiderRef.once('value');
            const prevData = prevSnapshot.val();
            await prevRiderRef.update({

              awards: Math.max(0, (prevData.awards || 0) - 1)
            });
            
            // Add credit back to kitty

            await kittyRef.set((kittySnapshot.val() || 0) + 5);

          const riderSnapshot = await riderRef.once('value');
          const riderData = riderSnapshot.val();
          
          const updates = {
            violations: (riderData.violations || 0) + (isPositive ? 0 : 1),
            [`pins/${selectedPin}`]: (riderData.pins?.[selectedPin] || 0) + 1

              <input 
                type="text" 
                className="form-input"
                value={category === 'positive' ? 'N/A (Award)' : '€5'}
                readOnly
                style={{ background: '#1e293b', color: category === 'positive' ? '#059669' : '#94a3b8', cursor: 'not-allowed', fontWeight: category === 'positive' ? '600' : 'normal' }}
              />
            </div>
            
            <div className="form-group">
              <label className="form-label">Description</label>
              <textarea 
                className="form-textarea"
                value={description}
                onChange={(e) => setDescription(e.target.value)}
                placeholder="What happened?"
              />
            </div>
            
            <div className="form-group">
              <label className="form-label">Photo Evidence</label>
              <label className="file-upload">
                <input 
                  type="file" 
                  accept="image/*"
                  capture="environment"
                  onChange={handlePhotoChange}
                />
                <div>📸 {photo ? 'Change Photo' : 'Take/Upload Photo'}</div>
              </label>
              {photoPreview && (
                <img src={photoPreview} alt="Preview" className="preview-image" />
              )}
            </div>
            
            <button 
              className="btn btn-primary"
              onClick={handleSubmit}
              disabled={uploading}
            >
              {uploading ? 'Submitting...' : 'Submit Violation'}
            </button>
          </div>
        </>
      );
    }
    
    function FeedTab({ activities }) {
      const formatTime = (timestamp) => {
        const date = new Date(timestamp);
        const now = new Date();
        const diffMs = now - date;
        const diffMins = Math.floor(diffMs / 60000);
        const diffHours = Math.floor(diffMs / 3600000);
        const diffDays = Math.floor(diffMs / 86400000);
        
        if (diffMins < 1) return 'Just now';
        if (diffMins < 60) return `${diffMins}m ago`;
        if (diffHours < 24) return `${diffHours}h ago`;
        if (diffDays === 1) return 'Yesterday';
        if (diffDays < 7) return `${diffDays}d ago`;
        
        // Show actual date for older entries
        const day = date.getDate();
        const month = date.toLocaleDateString('en-GB', { month: 'short' });
        const time = date.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
        return `${day} ${month} ${time}`;
      };
      
      const allPins = [...PIN_CATEGORIES.positive, ...PIN_CATEGORIES.negative];
      
      if (activities.length === 0) {
        return (
          <div className="empty-state">
            <div>No activity yet</div>
          </div>
        );
      }
      
      return (
        <>
          {activities.map(activity => {
            const pin = allPins.find(p => p.id === activity.pin);
            const isAward = activity.type === 'award';
            
            let pinName = pin ? `${pin.icon} ${pin.name}` : activity.pin;
            if (activity.pin === 'quote-challenge') pinName = '📝 Quote Challenge';
            if (activity.pin === 'assistant-duty') pinName = '💩 Assistant Duty';
            
            return (
              <div key={activity.id} className={`activity-item ${activity.type}`}>
                <div className="activity-header">
                  <div className="activity-type">
                    {isAward ? '🏆' : '⚠️'} {activity.rider}
                  </div>
                  <div className="activity-time">{formatTime(activity.timestamp)}</div>
                </div>
                <div className="activity-description">
                  <strong>{pinName}</strong>
                  {activity.fine > 0 && ` • €${activity.fine}`}
                  {activity.description && (
                    <div style={{ marginTop: '6px', color: '#cbd5e1' }}>
                      {activity.description}
                    </div>
                  )}
                  {activity.reportedBy && (
                    <div style={{ marginTop: '6px', fontSize: '12px', color: '#64748b' }}>
                      Reported by {activity.reportedBy}
                    </div>
                  )}
                </div>
                {activity.photoURL && (
                  <img src={activity.photoURL} alt="Evidence" className="activity-photo" />
                )}
              </div>
            );
          })}
        </>
      );
    }
    
    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
